<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>먹방 가챠 — MUKBANG GACHA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --acc: #3fd8ff;
    --acc-deep: #0f9cd8;
    --acc-rgb: 63, 216, 255;
    --btn-text: #fff;
    --navy: #14264d;
    --card: #ffffff;
    --line: #d7e3f0;
    --txt: #14264d;
    --txt-soft: #7286a5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }

  body {
    font-family: "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    font-weight: 500;
    background:
      radial-gradient(1100px 700px at 50% -12%, #ffffff 0%, #eef4fa 45%, #d9e4f0 100%);
    color: var(--txt);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 16px 30px;
    overflow-x: hidden;
    position: relative;
  }

  /* soft ambient color wash */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: .16;
    pointer-events: none;
    z-index: 0;
  }
  .blob.b1 { width: 420px; height: 420px; left: -120px; top: 12%; animation: drift1 15s ease-in-out infinite alternate; }
  .blob.b2 { width: 380px; height: 380px; right: -110px; top: 45%; animation: drift2 18s ease-in-out infinite alternate; }
  .blob.b3 { width: 300px; height: 300px; background: #b9a4ff; left: 42%; bottom: -140px; animation: drift1 21s ease-in-out infinite alternate; }
  @keyframes drift1 { from { transform: translate(0,0) } to { transform: translate(60px,-40px) } }
  @keyframes drift2 { from { transform: translate(0,0) } to { transform: translate(-70px,50px) } }

  .topbar {
    width: 100%;
    max-width: 1230px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 12px;
    z-index: 1;
  }
  .topbar h1 {
    font-family: "Jua", "Noto Sans KR", sans-serif;
    font-weight: 400;
    font-size: 32px;
    letter-spacing: 1px;
    color: var(--navy);
    text-shadow: 0 2px 0 #fff, 0 0 22px rgba(var(--acc-rgb), .45);
  }
  .topbar .en {
    font-size: 12.5px;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--acc-deep);
  }
  .topbar .ver {
    margin-left: auto;
    font-size: 11px;
    font-weight: 700;
    color: var(--txt-soft);
    opacity: .75;
  }

  .stage { width: 100%; max-width: 1230px; flex: 1; display: flex; justify-content: center; z-index: 1; }

  .hidden { display: none !important; }
  .invisible { visibility: hidden !important; }

  .white-panel {
    background: var(--card);
    border: 1.5px solid rgba(var(--acc-rgb), .45);
    border-radius: 22px;
    box-shadow: 0 0 26px rgba(var(--acc-rgb), .16), 0 16px 36px rgba(96, 125, 165, .28), inset 0 1px 0 #fff;
    color: var(--txt);
  }

  /* ---------- setup ---------- */
  .setup { width: 560px; align-self: flex-start; padding: 28px; margin-top: 14px; }
  .setup h2 {
    font-family: "Jua", sans-serif;
    font-weight: 400;
    font-size: 26px;
    letter-spacing: .5px;
    color: var(--navy);
    margin-bottom: 12px;
  }
  .setup ul.sub { list-style: none; margin-bottom: 16px; }
  .setup ul.sub li {
    font-size: 14px;
    color: var(--txt-soft);
    line-height: 1.6;
    padding: 3px 0 3px 20px;
    position: relative;
  }
  .setup ul.sub li::before {
    content: "";
    position: absolute;
    left: 4px; top: 12px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--acc);
    box-shadow: 0 0 6px rgba(var(--acc-rgb), .8);
  }
  .setup ul.sub b { color: var(--acc-deep); font-weight: 900; }
  .setup textarea {
    width: 100%;
    height: 290px;
    resize: vertical;
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    font: inherit;
    font-size: 15px;
    color: var(--txt);
    background: #f4f8fc;
    outline: none;
    line-height: 1.8;
    transition: border-color .2s, box-shadow .2s;
  }
  .setup textarea::placeholder { color: #a9bed4; }
  .setup textarea:focus { border-color: var(--acc); box-shadow: 0 0 14px rgba(var(--acc-rgb), .3); }
  .setup .meta { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; }
  .count-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 2px solid rgba(var(--acc-rgb), .55);
    background: linear-gradient(165deg, rgba(var(--acc-rgb), .14), rgba(var(--acc-rgb), .05));
    border-radius: 16px;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: 900;
    color: var(--navy);
    box-shadow: 0 0 16px rgba(var(--acc-rgb), .25), inset 0 1px 0 rgba(255,255,255,.7);
  }
  .count-chip .num {
    font-family: "Jua", sans-serif;
    font-weight: 400;
    font-size: 30px;
    line-height: 1;
    color: var(--acc-deep);
  }

  .btn {
    cursor: pointer;
    border: none;
    font-family: inherit;
    font-weight: 900;
    color: var(--btn-text);
    background: linear-gradient(165deg, var(--acc), var(--acc-deep));
    border-radius: 14px;
    padding: 13px 28px;
    font-size: 16px;
    letter-spacing: .5px;
    box-shadow: 0 0 18px rgba(var(--acc-rgb), .4), inset 0 2px 0 rgba(255,255,255,.4), 0 6px 14px rgba(96,125,165,.35);
    transition: transform .12s ease, box-shadow .2s ease, opacity .2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 0 28px rgba(var(--acc-rgb), .6), inset 0 2px 0 rgba(255,255,255,.4), 0 10px 18px rgba(96,125,165,.4); }
  .btn:active { transform: translateY(0) scale(.98); }
  .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn.ghost {
    background: #fff;
    color: var(--acc-deep);
    box-shadow: inset 0 0 0 1.5px rgba(var(--acc-rgb), .6), 0 4px 10px rgba(96,125,165,.25);
  }
  .btn.ghost:hover { box-shadow: inset 0 0 0 1.5px var(--acc), 0 0 14px rgba(var(--acc-rgb), .35); }

  /* ---------- game layout ---------- */
  .game { display: flex; gap: 18px; align-items: flex-start; }
  .machine-wrap {
    position: relative;
    flex: none;
    filter: drop-shadow(0 24px 40px rgba(96,125,165,.45)) drop-shadow(0 0 30px rgba(var(--acc-rgb), .25));
  }
  canvas { display: block; border-radius: 26px; }

  .side { width: 270px; flex: none; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .side .panel-title {
    font-size: 11px;
    font-weight: 900;
    color: var(--acc-deep);
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .keys {
    background: #f4f8fc;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 13.5px;
    line-height: 2.2;
    color: var(--txt);
  }
  .keys kbd {
    background: var(--navy);
    color: var(--acc);
    border-radius: 7px;
    padding: 2px 10px;
    font-family: inherit;
    font-weight: 900;
    font-size: 12px;
    box-shadow: 0 2px 0 #060d1d;
  }
  .side .foot { display: flex; gap: 8px; }
  .side .foot .btn { flex: 1; padding: 11px 0; font-size: 13.5px; }

  /* ---------- reveal / result overlays ---------- */
  .ov {
    position: absolute;
    inset: 0;
    border-radius: 26px;
    background: radial-gradient(circle at 50% 28%, rgba(var(--acc-rgb), .14) 0%, rgba(9,14,24,.86) 62%);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .ov-card {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: linear-gradient(175deg, #ffffff, #eef5fc);
    border: 1.5px solid rgba(var(--acc-rgb), .55);
    border-radius: 24px;
    box-shadow: 0 0 44px rgba(var(--acc-rgb), .35), 0 26px 60px rgba(0,0,0,.6), inset 0 1px 0 #fff;
    padding: 28px 36px;
    text-align: center;
    width: 470px;
    min-height: 430px;
    max-width: 94%;
    overflow: hidden;
    color: var(--txt);
  }
  .ov-card.jackpot { animation: jackpotring 1.2s ease-in-out infinite; }
  @keyframes jackpotring {
    0%,100% { box-shadow: 0 0 44px rgba(255,209,102,.5), 0 26px 60px rgba(0,0,0,.6); border-color: rgba(255,209,102,.75); }
    50%     { box-shadow: 0 0 70px rgba(var(--acc-rgb), .6), 0 26px 60px rgba(0,0,0,.6); border-color: rgba(var(--acc-rgb), .8); }
  }

  .rv-label {
    font-size: 12px;
    font-weight: 900;
    color: var(--acc-deep);
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  /* same style family as CAPSULE OPEN, just a notch bigger */
  .rv-label.big {
    font-size: 16px;
    letter-spacing: 5px;
  }
  .ov-card.compact .rv-btns .btn { flex: 0 0 auto; padding: 13px 40px; }

  .cap-stage { position: relative; height: 220px; display: flex; align-items: center; justify-content: center; }

  /* soft glow halo + one-shot shockwave ring (replaces the sunburst) */
  .halo {
    position: absolute;
    left: 50%; top: 50%;
    width: 360px; height: 360px;
    transform: translate(-50%,-50%);
    background: radial-gradient(circle, rgba(var(--acc-rgb), .30) 0%, rgba(var(--acc-rgb), 0) 62%);
    opacity: 0;
    transition: opacity .6s;
    pointer-events: none;
  }
  .halo.on { opacity: 1; }
  .ring {
    position: absolute;
    left: 50%; top: 50%;
    width: 130px; height: 130px;
    margin: -65px 0 0 -65px;
    border-radius: 50%;
    border: 3px solid rgba(var(--acc-rgb), .85);
    opacity: 0;
    pointer-events: none;
  }
  .ring.go { animation: ringout .7s ease-out forwards; }
  @keyframes ringout {
    0%   { transform: scale(.4); opacity: .95; }
    100% { transform: scale(2.7); opacity: 0; }
  }

  .capsule { position: relative; width: 170px; height: 170px; filter: drop-shadow(0 16px 26px rgba(20,38,77,.35)); }
  .capsule .half {
    position: absolute; left: 0; width: 170px; height: 85px;
    transition: transform .45s cubic-bezier(.34,1.56,.64,1), opacity .45s;
  }
  .capsule .top {
    top: 0;
    border-radius: 85px 85px 8px 8px;
    background:
      radial-gradient(circle at 30% 26%, rgba(255,255,255,.85) 0%, rgba(255,255,255,0) 34%),
      linear-gradient(180deg, rgba(255,255,255,.25), rgba(0,0,0,.14)),
      var(--capcol, #3fd8ff);
  }
  .capsule .bot {
    bottom: 0;
    border-radius: 8px 8px 85px 85px;
    background:
      radial-gradient(circle at 32% 30%, rgba(255,255,255,.9) 0%, rgba(255,255,255,0) 30%),
      linear-gradient(180deg, #ffffff, #d9dfec 70%, #b7c1d6);
  }
  .capsule.shaking { animation: capshake .12s linear infinite; }
  @keyframes capshake {
    0%   { transform: rotate(-8deg) translateX(-4px); }
    50%  { transform: rotate(8deg)  translateX(4px); }
    100% { transform: rotate(-8deg) translateX(-4px); }
  }
  .capsule.opened .top { transform: translateY(-104px) rotate(-26deg); opacity: 0; }
  .capsule.opened .bot { transform: translateY(56px) rotate(11deg); opacity: 0; }

  .food-name {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%,-50%) scale(0);
    font-family: "Jua", sans-serif;
    font-weight: 400;
    font-size: 56px;
    letter-spacing: 1px;
    color: var(--navy);
    text-shadow: 0 0 18px rgba(var(--acc-rgb), .55);
    white-space: pre-line;
    word-break: keep-all;   /* Korean may only ever wrap at spaces */
    width: 396px;           /* definite width — abs-positioned at left:50%, shrink-to-fit
                               would cap it at half the stage and re-wrap the lines */
    line-height: 1.12;
    text-align: center;
    transition: transform .5s cubic-bezier(.34,1.7,.64,1);
    z-index: 2;
  }
  .food-name.pop { transform: translate(-50%,-50%) scale(1); }
  .spark {
    position: absolute;
    font-size: 24px;
    left: 50%; top: 50%;
    animation: sparkfly 1s ease-out forwards;
    pointer-events: none;
    z-index: 3;
  }
  @keyframes sparkfly {
    0%   { transform: translate(0,0) scale(.4); opacity: 1; }
    100% { transform: translate(var(--sx), var(--sy)) scale(1.3); opacity: 0; }
  }

  .rv-btns { display: flex; gap: 10px; justify-content: center; margin-top: 18px; position: relative; z-index: 2; }
  .rv-btns .btn { flex: 1 1 0; min-width: 0; padding: 13px 0; font-size: 16px; }
  .rv-note {
    font-size: 12.5px;
    color: var(--txt-soft);
    margin-top: 14px;
    height: 18px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
    z-index: 2;
  }

  .result-big {
    font-family: "Jua", sans-serif;
    font-weight: 400;
    font-size: 60px;
    color: var(--navy);
    margin: 14px 0 4px;
    letter-spacing: 1px;
    text-shadow: 0 0 22px rgba(var(--acc-rgb), .5);
    white-space: pre-line;
    word-break: keep-all;
    max-width: 396px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.12;
  }

  .confetti {
    position: fixed;
    top: -20px;
    width: 10px; height: 14px;
    border-radius: 3px;
    z-index: 50;
    pointer-events: none;
    animation: confall linear forwards;
  }
  @keyframes confall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(108vh) rotate(720deg); opacity: .7; }
  }
</style>
</head>
<body>
  <div class="blob b1" id="blob1"></div>
  <div class="blob b2" id="blob2"></div>
  <div class="blob b3"></div>

  <div class="topbar">
    <h1>먹방 가챠</h1>
    <span class="en">MUKBANG GACHA</span>
    <span class="ver" id="verTag"></span>
  </div>

  <div class="stage">

    <!-- setup -->
    <div class="white-panel setup" id="setup">
      <h2>캡슐 채우기</h2>
      <ul class="sub">
        <li>한 줄에 음식 하나씩 입력하세요</li>
        <li><b>*숫자</b>로 같은 음식 캡슐을 여러 개 넣어요 (예: <b>핫도그*2</b> → 핫도그 2개)</li>
        <li>캡슐은 최대 <b>120개</b>까지 들어가요</li>
      </ul>
      <textarea id="foodInput" placeholder="핫도그*2
마라탕
치킨*3
초밥"></textarea>
      <div class="meta">
        <span class="count-chip">캡슐 <span class="num" id="liveCount">0</span> 개</span>
        <button class="btn" id="btnStart" disabled>뽑기 시작</button>
      </div>
    </div>

    <!-- game -->
    <div class="game hidden" id="game">
      <div class="machine-wrap">
        <canvas id="cv" width="920" height="800"></canvas>

        <!-- reveal overlay -->
        <div class="ov hidden" id="revealOv">
          <div class="ov-card">
            <div class="rv-label">CAPSULE OPEN</div>
            <div class="cap-stage" id="capStage">
              <div class="halo" id="halo1"></div>
              <div class="ring" id="ring1"></div>
              <div class="capsule" id="capEl">
                <div class="half top"></div>
                <div class="half bot"></div>
              </div>
              <div class="food-name" id="foodName"></div>
            </div>
            <div class="rv-btns invisible" id="rvBtns">
              <button class="btn ghost" id="btnReroll">다시 뽑기</button>
              <button class="btn" id="btnConfirm">이걸로 확정</button>
            </div>
            <div class="rv-note" id="rvNote"></div>
          </div>
        </div>

        <!-- final result overlay -->
        <div class="ov hidden" id="resultOv">
          <div class="ov-card jackpot compact">
            <div class="rv-label big">오늘의 먹방 메뉴</div>
            <div class="cap-stage" style="height:190px;">
              <div class="halo on"></div>
              <div class="result-big" id="resultName" style="position:relative; z-index:2;"></div>
            </div>
            <div class="rv-btns">
              <button class="btn" id="btnHome2">🏠 처음으로</button>
            </div>
          </div>
        </div>
      </div>

      <!-- side panel -->
      <div class="white-panel side">
        <div>
          <div class="panel-title">CONTROLS · 조작법</div>
          <div class="keys">
            <kbd>←</kbd> <kbd>→</kbd> 집게 이동<br>
            <kbd>↓</kbd> 또는 <kbd>SPACE</kbd> 집게 내리기
          </div>
        </div>
        <div class="foot">
          <button class="btn ghost" id="btnMute">🔊 소리</button>
          <button class="btn ghost" id="btnHome">🏠 처음으로</button>
        </div>
      </div>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
(function () {
  "use strict";

  /* ---------------- version ----------------
   * Bump on every change: PATCH for fixes, MINOR for features, MAJOR for redesigns.
   *
   * 1.0.1  counter no longer bounces up while the prize ball falls (excluded through grab→shaft→door)
   * 1.0.0  launcher card added (launcher.html) — shipped to prod
   * 0.7.0  QA pass: ?fast timer double-scaling, name wrap max 2 lines at spaces only,
   *        reveal button phase-gates, dangling * stripped, claw locked while capsules rain in
   * 0.6.0  shuffle = full re-drop, prize ball falls THROUGH the floor hole into the door,
   *        divider raised, counter light/vertical, 120-capsule cap, result modal cleanup
   * 0.5.0  light background + light marquee, joystick/PUSH removed, on-canvas 셔플 button
   *        w/ cooldown, halo+ring reveal (sunburst removed), claw glides back after reroll
   * 0.4.0  renamed 먹방 가챠, Jua/Noto fonts, random 5-color theme system, base redesign,
   *        toasts removed, focus-reload bug fixed
   * 0.3.0  "Tokyo Station" white cabinet redesign (LED rim, bright glass, prize-out badge)
   * 0.2.0  neon arcade revamp, 920×800 cabinet, bigger pit
   * 0.1.0  first build: pastel claw machine, mystery capsules, reroll-discards rule
   */
  var VERSION = "1.0.1";

  /* ---------------- theme (random per open) ---------------- */
  var THEMES = {
    blue:   { main: "#3fd8ff", deep: "#0f9cd8", rgb: "63,216,255",  btnText: "#ffffff" },
    pink:   { main: "#ff6ec7", deep: "#e0349d", rgb: "255,110,199", btnText: "#ffffff" },
    yellow: { main: "#ffd93f", deep: "#eaa500", rgb: "255,217,63",  btnText: "#5c4500" },
    orange: { main: "#ff9f45", deep: "#f2711c", rgb: "255,159,69",  btnText: "#5a2b00" },
    red:    { main: "#ff5566", deep: "#d61f3e", rgb: "255,85,102",  btnText: "#ffffff" }
  };
  var themeNames = Object.keys(THEMES);
  var THEME = THEMES[themeNames[Math.floor(Math.random() * themeNames.length)]];
  (function applyTheme() {
    var rs = document.documentElement.style;
    rs.setProperty("--acc", THEME.main);
    rs.setProperty("--acc-deep", THEME.deep);
    rs.setProperty("--acc-rgb", THEME.rgb);
    rs.setProperty("--btn-text", THEME.btnText);
    document.getElementById("blob1").style.background = THEME.main;
    document.getElementById("blob2").style.background = THEME.deep;
    document.getElementById("verTag").textContent = "v" + VERSION;
  })();
  function accA(a) { return "rgba(" + THEME.rgb + "," + a + ")"; }

  /* ---------------- config ---------------- */
  var FAST = Math.max(1, parseFloat(new URLSearchParams(location.search).get("fast")) || 1);
  function ms(t) { return t / FAST; }

  var W = 920, H = 800;
  var TANK = { left: 56, right: 864, top: 112, floor: 590 };
  var CHUTE = { wallX: 158, openY: 265, cx: 106 };
  var RAIL_Y = TANK.top + 20;
  var TIP_IDLE = 174;
  var MAX_BALLS = 120;
  var BASE_Y = TANK.floor + 16, BASE_H = H - TANK.floor - 62, BASE_MID = BASE_Y + BASE_H / 2;
  var PRIZE_Y = BASE_Y + BASE_H - 36; // catch floor inside the prize-out door
  var SHUFFLE_BTN = { x: W / 2, y: BASE_MID, r: 36 };
  var SHUFFLE_CD_MAX = 2.2;

  var PALETTE = ["#ff5fa2", "#ffd166", "#7cf29c", "#5fd0ff", "#c792ff", "#ff8f5f", "#f9f871", "#6df2e2"];

  /* ---------------- dom ---------------- */
  var $ = function (id) { return document.getElementById(id); };
  var setup = $("setup"), game = $("game"), cv = $("cv"), ctx = cv.getContext("2d");
  var foodInput = $("foodInput"), liveCount = $("liveCount"), btnStart = $("btnStart");
  var revealOv = $("revealOv"), capEl = $("capEl"), capStage = $("capStage"), foodName = $("foodName");
  var halo1 = $("halo1"), ring1 = $("ring1");
  var rvBtns = $("rvBtns"), rvNote = $("rvNote"), btnReroll = $("btnReroll"), btnConfirm = $("btnConfirm");
  var resultOv = $("resultOv"), resultName = $("resultName");

  /* ---------------- audio (all synthesized) ---------------- */
  var AC = null, master, muted = localStorage.getItem("claw.muted") === "1";
  function ac() {
    if (!AC) {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain();
      master.gain.value = muted ? 0 : 0.5;
      master.connect(AC.destination);
    }
    if (AC.state === "suspended") AC.resume();
    return AC;
  }
  function tone(f0, f1, dur, type, vol, when) {
    if (muted) return;
    var a = ac(), t = a.currentTime + (when || 0);
    var o = a.createOscillator(), g = a.createGain();
    o.type = type || "sine";
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
    g.gain.setValueAtTime(vol || 0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + dur + 0.05);
  }
  var sfx = {
    move:   function () { tone(170, 150, 0.05, "square", 0.05); },
    descend:function () { tone(420, 160, 0.7, "sawtooth", 0.05); },
    grab:   function () { tone(900, 500, 0.09, "square", 0.12); tone(240, 180, 0.15, "triangle", 0.12, 0.05); },
    lift:   function () { tone(180, 380, 0.5, "sawtooth", 0.04); },
    thud:   function () { tone(150, 70, 0.18, "triangle", 0.2); },
    miss:   function () { tone(330, 300, 0.18, "triangle", 0.14); tone(280, 200, 0.35, "triangle", 0.14, 0.2); },
    pop:    function () { tone(600, 120, 0.12, "square", 0.2); tone(1300, 900, 0.1, "sine", 0.12); },
    deny:   function () { tone(190, 140, 0.09, "square", 0.08); },
    shuffle:function () {
      for (var i = 0; i < 8; i++) tone(220 + Math.random() * 300, 180, 0.05, "square", 0.07, i * 0.04);
      tone(120, 300, 0.35, "sawtooth", 0.06);
    },
    drum:   function (total) {
      var n = 26;
      for (var i = 0; i < n; i++) {
        var p = i / n;
        tone(200 + p * 60, 180, 0.03, "square", 0.05 + p * 0.06, total * (1 - Math.pow(1 - p, 1.7)));
      }
    },
    jingle: function () {
      [523, 659, 784, 1047].forEach(function (f, i) { tone(f, f, 0.22, "triangle", 0.14, i * 0.09); });
    },
    fanfare:function () {
      [523, 659, 784, 1047, 784, 1047, 1319].forEach(function (f, i) { tone(f, f, 0.3, "triangle", 0.15, i * 0.13); });
      tone(262, 262, 1.2, "sine", 0.1, 0.4);
    }
  };

  /* ---------------- parsing ---------------- */
  function parseFoods(text) {
    var out = [];
    text.split(/\n/).forEach(function (line) {
      line = line.trim();
      if (!line) return;
      var m = line.match(/^(.*?)(?:\s*[*xX×]\s*(\d+))?$/);
      var name = (m[1] || "").replace(/[*×]\s*$/, "").trim(); // drop a dangling multiplier symbol
      var n = m[2] ? parseInt(m[2], 10) : 1;
      if (!name || !n) return;
      for (var i = 0; i < n && out.length < MAX_BALLS; i++) out.push(name);
    });
    return out;
  }

  foodInput.value = localStorage.getItem("claw.foods") || "";
  function refreshCount() {
    var n = parseFoods(foodInput.value).length;
    liveCount.textContent = n;
    btnStart.disabled = n === 0;
    localStorage.setItem("claw.foods", foodInput.value);
  }
  foodInput.addEventListener("input", refreshCount);
  refreshCount();

  /* ---------------- physics world ---------------- */
  var engine = null, world = null, balls = [];

  function buildWorld(foods) {
    engine = Matter.Engine.create();
    world = engine.world;
    balls = [];

    var opts = { isStatic: true, restitution: 0, friction: 0.4 };
    var thick = 40;
    Matter.Composite.add(world, [
      // pit floor starts exactly at the divider — the shaft is an open hole down
      // to the prize door (no overhang into the shaft, or falling balls clip it)
      Matter.Bodies.rectangle((CHUTE.wallX + TANK.right + 40) / 2, TANK.floor + thick / 2, TANK.right + 40 - CHUTE.wallX, thick, opts),
      Matter.Bodies.rectangle(TANK.left - thick / 2, (TANK.top + TANK.floor) / 2, thick, TANK.floor - TANK.top + 300, opts),
      Matter.Bodies.rectangle(TANK.right + thick / 2, (TANK.top + TANK.floor) / 2, thick, TANK.floor - TANK.top + 300, opts),
      Matter.Bodies.rectangle(CHUTE.wallX, (CHUTE.openY + TANK.floor) / 2, 12, TANK.floor - CHUTE.openY, opts),
      // shaft channel wall below the floor + catch floor inside the prize door
      Matter.Bodies.rectangle(CHUTE.wallX, TANK.floor + 80, 12, 160, opts),
      Matter.Bodies.rectangle(CHUTE.cx, PRIZE_Y + thick / 2, 150, thick, opts)
    ]);

    var r = ballRadius(foods.length);
    var shuffled = foods.slice();
    for (var i = shuffled.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1)), t = shuffled[i];
      shuffled[i] = shuffled[j]; shuffled[j] = t;
    }
    shuffled.forEach(function (food, idx) {
      var x = CHUTE.wallX + 30 + r + Math.random() * (TANK.right - CHUTE.wallX - 60 - r * 2);
      var y = TANK.top - 40 - (idx * r * 1.05) - Math.random() * 30;
      var b = Matter.Bodies.circle(x, y, r, { restitution: 0.25, friction: 0.15, frictionAir: 0.004, density: 0.0012 });
      b.plugin.food = food;
      b.plugin.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      balls.push(b);
      Matter.Composite.add(world, b);
    });
    return r;
  }

  function ballRadius(n) {
    if (n <= 12) return 33;
    if (n <= 20) return 29;
    if (n <= 30) return 26;
    if (n <= 42) return 23;
    if (n <= 58) return 20;
    if (n <= 80) return 18;
    return 16;
  }

  /* ---------------- game state ---------------- */
  var phase = "setup"; // setup | aim | drop | grabbing | lift | carry | release | reveal | return | result
  var clawX = 500, tipY = TIP_IDLE, prongOpen = 1;
  var grabbed = null, ballR = 24;
  var keys = { left: false, right: false };
  var pulls = [];
  var phaseT = 0;
  var swing = { a: 0, v: 0 };
  var releaseWatch = null;
  var moveTickT = 0;
  var lightsT = 0;
  var shuffleCd = 0;

  var AIM_MIN = function () { return CHUTE.wallX + ballR + 16; };
  var AIM_MAX = function () { return TANK.right - ballR - 16; };
  var AIM_HOME = function () { return (AIM_MIN() + AIM_MAX()) / 2; };
  var SPD = { aim: 280, drop: 320, lift: 320, carry: 265 };

  function setPhase(p) { phase = p; phaseT = 0; }

  // a ball leaves the pool count the moment it's grabbed, and stays excluded
  // through its whole exit: carried → falling down the shaft → waiting in the
  // prize door (otherwise the counter bounces up while the prize ball falls)
  function poolLeft() {
    var n = 0;
    for (var i = 0; i < balls.length; i++) {
      var b = balls[i];
      if (b === grabbed || b === releaseWatch || b.plugin.captured) continue;
      n++;
    }
    return n;
  }

  /* ---------------- start / reset ---------------- */
  btnStart.addEventListener("click", function () {
    var foods = parseFoods(foodInput.value);
    if (!foods.length) return;
    ac();
    ballR = buildWorld(foods);
    pulls = [];
    grabbed = null;
    clawX = AIM_HOME();
    tipY = TIP_IDLE;
    prongOpen = 1;
    shuffleCd = 0;
    setup.classList.add("hidden");
    game.classList.remove("hidden");
    setPhase("aim");
    sfx.jingle();
  });

  function goHome() { location.reload(); }
  $("btnHome").addEventListener("click", goHome);
  $("btnHome2").addEventListener("click", goHome);

  var btnMute = $("btnMute");
  function paintMute() { btnMute.textContent = muted ? "🔇 음소거" : "🔊 소리"; }
  paintMute();
  btnMute.addEventListener("click", function () {
    muted = !muted;
    localStorage.setItem("claw.muted", muted ? "1" : "0");
    if (master) master.gain.value = muted ? 0 : 0.5;
    paintMute();
  });

  // true while capsules are still raining in (game start or shuffle) —
  // the claw stays locked until every ball is inside the glass
  function raining() {
    for (var i = 0; i < balls.length; i++) {
      if (balls[i].position.y < TANK.top) return true;
    }
    return false;
  }

  /* ---------------- shuffle (circular button on the machine base) ---------------- */
  function shuffleReady() { return phase === "aim" && shuffleCd <= 0 && !raining(); }

  function doShuffle() {
    if (!shuffleReady()) return;
    shuffleCd = SHUFFLE_CD_MAX;
    // re-drop: scoop everything up and rain it back in, like the opening
    var r = ballR;
    var order = balls.slice();
    for (var i = order.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1)), t = order[i];
      order[i] = order[j]; order[j] = t;
    }
    order.forEach(function (b, idx) {
      var x = CHUTE.wallX + 30 + r + Math.random() * (TANK.right - CHUTE.wallX - 60 - r * 2);
      var y = TANK.top - 40 - idx * r * 1.05 - Math.random() * 30;
      Matter.Body.setPosition(b, { x: x, y: y });
      Matter.Body.setVelocity(b, { x: 0, y: 2 });
      Matter.Body.setAngularVelocity(b, 0);
    });
    sfx.shuffle();
  }

  function canvasPos(e) {
    var r = cv.getBoundingClientRect();
    return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
  }
  function overShuffle(p) {
    var dx = p.x - SHUFFLE_BTN.x, dy = p.y - SHUFFLE_BTN.y;
    return dx * dx + dy * dy <= SHUFFLE_BTN.r * SHUFFLE_BTN.r;
  }
  cv.addEventListener("click", function (e) {
    if (overShuffle(canvasPos(e))) doShuffle();
  });
  cv.addEventListener("mousemove", function (e) {
    cv.style.cursor = overShuffle(canvasPos(e)) && shuffleReady() ? "pointer" : "default";
  });

  /* ---------------- input ---------------- */
  // keep keyboard focus off buttons: Space/Enter must never re-click the last
  // pressed button (this was intermittently reloading the app mid-game)
  document.addEventListener("click", function (e) {
    var b = e.target && e.target.closest ? e.target.closest("button") : null;
    if (b) b.blur();
  });

  document.addEventListener("keydown", function (e) {
    if (phase === "setup" || document.activeElement === foodInput) return;
    if (document.activeElement && document.activeElement.tagName === "BUTTON") document.activeElement.blur();
    if (e.key === "ArrowLeft")  { keys.left = true;  e.preventDefault(); }
    if (e.key === "ArrowRight") { keys.right = true; e.preventDefault(); }
    if (e.key === "ArrowDown" || e.key === " ") {
      e.preventDefault();
      if (phase === "aim") startDrop();
    }
  });
  document.addEventListener("keyup", function (e) {
    if (e.key === "ArrowLeft") keys.left = false;
    if (e.key === "ArrowRight") keys.right = false;
  });

  /* ---------------- claw sequence ---------------- */
  function startDrop() {
    if (raining()) { sfx.deny(); return; } // wait for the capsules to land first
    setPhase("drop");
    prongOpen = 1;
    sfx.descend();
  }

  function tryGrabAt() {
    var best = null, bestD = 1e9;
    for (var i = 0; i < balls.length; i++) {
      var b = balls[i];
      var dx = b.position.x - clawX, dy = b.position.y - tipY;
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d < ballR * 0.85 && d < bestD) { best = b; bestD = d; }
    }
    return best;
  }

  function jostle() {
    for (var i = 0; i < balls.length; i++) {
      var b = balls[i];
      var dx = b.position.x - clawX, dy = b.position.y - tipY;
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d > 0 && d < ballR + 34) {
        Matter.Body.applyForce(b, b.position, { x: (dx / d) * 0.0006 * b.mass, y: -0.0003 * b.mass });
      }
    }
  }

  function update(dt) {
    lightsT += dt;
    if (!engine) return;
    shuffleCd = Math.max(0, shuffleCd - dt);

    if (phase === "aim") {
      var dir = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
      if (dir !== 0) {
        clawX = Math.max(AIM_MIN(), Math.min(AIM_MAX(), clawX + dir * SPD.aim * dt));
        moveTickT += dt;
        if (moveTickT > 0.09) { moveTickT = 0; sfx.move(); }
      }
    }

    else if (phase === "return") {
      // glide back to center after a reroll (no snap-jump from the chute)
      var target = AIM_HOME();
      var step = SPD.aim * 1.3 * dt;
      if (Math.abs(target - clawX) <= step) {
        clawX = target;
        setPhase("aim");
      } else {
        clawX += (target > clawX ? 1 : -1) * step;
        moveTickT += dt;
        if (moveTickT > 0.09) { moveTickT = 0; sfx.move(); }
      }
    }

    else if (phase === "drop") {
      tipY += SPD.drop * dt;
      jostle();
      var hit = tryGrabAt();
      if (hit || tipY >= TANK.floor - 16) {
        grabbed = hit;
        setPhase("grabbing");
        sfx.grab();
      }
    }

    else if (phase === "grabbing") {
      // dt is already FAST-scaled, so compare against real-time constants here
      phaseT += dt;
      prongOpen = Math.max(grabbed ? 0.42 : 0.05, 1 - phaseT / 0.28);
      if (phaseT >= 0.32) {
        if (grabbed) Matter.Body.setStatic(grabbed, true);
        setPhase("lift");
        sfx.lift();
      }
    }

    else if (phase === "lift") {
      tipY -= SPD.lift * dt;
      if (tipY <= TIP_IDLE) {
        tipY = TIP_IDLE;
        if (grabbed) {
          setPhase("carry");
        } else {
          setPhase("aim");
          prongOpen = 1;
          sfx.miss();
        }
      }
    }

    else if (phase === "carry") {
      clawX -= SPD.carry * dt;
      if (clawX <= CHUTE.cx) {
        clawX = CHUTE.cx;
        setPhase("release");
      }
    }

    else if (phase === "release") {
      phaseT += dt;
      prongOpen = Math.min(1, prongOpen + dt * 4);
      if (grabbed && phaseT >= 0.22) {
        var b = grabbed;
        grabbed = null;
        Matter.Body.setStatic(b, false);
        Matter.Body.setVelocity(b, { x: 0, y: 2 });
        releaseWatch = b;
        setPhase("reveal");
      }
    }

    if (grabbed) {
      var ox = Math.sin(swing.a) * 26;
      var oy = (1 - Math.cos(swing.a)) * 12;
      Matter.Body.setPosition(grabbed, { x: clawX + ox, y: tipY + 20 + ballR * 0.55 + oy });
      Matter.Body.setAngle(grabbed, swing.a * 0.7);
    }

    if (releaseWatch) {
      var rb = releaseWatch;
      if (rb.position.y >= PRIZE_Y - ballR - 4) {
        releaseWatch = null;
        rb.plugin.captured = true;
        sfx.thud();
        setTimeout(function () { captureBall(rb); }, ms(420));
      }
    }

    // shaft guard: no pool ball may ever enter the prize shaft
    for (var gi = 0; gi < balls.length; gi++) {
      var gb = balls[gi];
      if (gb === grabbed || gb === releaseWatch || gb.isStatic || gb.plugin.captured) continue;
      if (gb.position.x < CHUTE.wallX + 6 && gb.position.y < CHUTE.openY) {
        // airborne above the divider — bounce it back toward the pit
        Matter.Body.setVelocity(gb, { x: Math.max(3, Math.abs(gb.velocity.x)), y: gb.velocity.y });
      } else if (gb.position.x < CHUTE.wallX - 6) {
        // somehow ended up inside the shaft — recycle it back into the pit
        Matter.Body.setPosition(gb, { x: CHUTE.wallX + 80 + Math.random() * 200, y: TANK.top + 40 });
        Matter.Body.setVelocity(gb, { x: 0, y: 2 });
      }
    }
  }

  /* ---------------- reveal ---------------- */
  function captureBall(b) {
    Matter.Composite.remove(world, b);
    balls.splice(balls.indexOf(b), 1);
    openReveal(b.plugin.food, b.plugin.color);
  }

  function openReveal(food, color) {
    revealOv.classList.remove("hidden");
    rvBtns.classList.add("invisible");
    halo1.classList.remove("on");
    ring1.classList.remove("go");
    rvNote.textContent = "";
    foodName.textContent = "";
    foodName.classList.remove("pop");
    capEl.classList.remove("opened");
    capEl.style.display = "";
    capEl.style.setProperty("--capcol", color);

    var shakeDur = ms(1.4);
    capEl.classList.add("shaking");
    sfx.drum(shakeDur);

    setTimeout(function () {
      capEl.classList.remove("shaking");
      capEl.classList.add("opened");
      halo1.classList.add("on");

      ring1.classList.add("go");

      setTimeout(function () {
        foodName.textContent = food;

        foodName.classList.add("pop");
        sfx.jingle();
        pulls.push({ name: food, kept: false });
        showButtons(food);
      }, ms(180));
    }, shakeDur * 1000);
  }

  function sparkle() {
    for (var i = 0; i < 12; i++) {
      var s = document.createElement("span");
      s.className = "spark";
      s.textContent = ["✨", "⭐", "💫"][i % 3];
      var ang = Math.random() * Math.PI * 2, dist = 80 + Math.random() * 90;
      s.style.setProperty("--sx", Math.cos(ang) * dist + "px");
      s.style.setProperty("--sy", Math.sin(ang) * dist - 30 + "px");
      capStage.appendChild(s);
      setTimeout(function (el) { el.remove(); }.bind(null, s), 1100);
    }
  }

  // long names wrap to AT MOST 2 lines, only ever breaking at a space
  // (nearest the middle); unspaced names stay on one line and shrink to fit
  var NAME_MAX_W = 390; // usable width inside the 470px modal
  function nameFont(size) { return size + "px 'Jua', 'Noto Sans KR', sans-serif"; }
  function splitTwo(name) {
    var best = -1, bestDist = Infinity;
    for (var i = 0; i < name.length; i++) {
      if (name[i] === " ") {
        var d = Math.abs(i - name.length / 2);
        if (d < bestDist) { bestDist = d; best = i; }
      }
    }
    if (best < 0) return [name];
    return [name.slice(0, best).trim(), name.slice(best + 1).trim()];
  }
  function fitName(el, name, base) {
    name = name.replace(/\s+/g, " ").trim();
    ctx.font = nameFont(base);
    var lines = [name];
    var size = base;
    if (ctx.measureText(name).width > NAME_MAX_W && name.indexOf(" ") >= 0) {
      lines = splitTwo(name);
      size = base * 0.72;
    }
    ctx.font = nameFont(size);
    var maxW = 0;
    lines.forEach(function (l) { maxW = Math.max(maxW, ctx.measureText(l).width); });
    if (maxW > NAME_MAX_W) size = Math.max(18, size * NAME_MAX_W / maxW); // shrink, never break words
    el.style.fontSize = Math.round(size) + "px";
    el.textContent = lines.join("\n");
  }

  function showButtons(food) {
    rvBtns.classList.remove("invisible");
    var left = balls.length;
    if (left > 0) {
      btnReroll.classList.remove("hidden");

    } else {

      rvNote.textContent = "마지막 캡슐! 이걸로 확정됩니다";
    }
  }

  btnReroll.addEventListener("click", function () {
    if (phase !== "reveal") return;
    revealOv.classList.add("hidden");
    prongOpen = 1;
    setPhase("return");
  });

  btnConfirm.addEventListener("click", function () {
    if (phase !== "reveal") return;

    last.kept = true;
    revealOv.classList.add("hidden");

    resultName.textContent = last.name;
    fitName(resultName, last.name, 60);
    resultOv.classList.remove("hidden");

  function confetti() {
    for (var i = 0; i < 100; i++) {
      var c = document.createElement("div");
      c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = PALETTE[i % PALETTE.length];
      c.style.animationDuration = (2.2 + Math.random() * 2.4) + "s";
      c.style.animationDelay = Math.random() * 1.4 + "s";
      c.style.width = (7 + Math.random() * 7) + "px";

      document.body.appendChild(c);
      setTimeout(function (el) { el.remove(); }.bind(null, c), 6500);
    }
  }

  /* ---------------- drawing helpers ---------------- */
  function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function chromeGrad(y0, y1) {
    var g = ctx.createLinearGradient(0, y0, 0, y1);
    g.addColorStop(0, "#f2f3f8");
    g.addColorStop(0.45, "#a8aec2");
    g.addColorStop(0.55, "#8b92a8");
    g.addColorStop(1, "#dcdfe8");
    return g;
  }

  function glow(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
  function noGlow() { ctx.shadowColor = "transparent"; ctx.shadowBlur = 0; }

  function star(x, y, r, color, rot) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot || 0);
    ctx.beginPath();
    for (var i = 0; i < 5; i++) {
      var a = -Math.PI / 2 + i * 2 * Math.PI / 5;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      var a2 = a + Math.PI / 5;
      ctx.lineTo(Math.cos(a2) * r * 0.45, Math.sin(a2) * r * 0.45);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }

  // sticker stars on the glass — corner clusters, kept away from the claw's
  // idle center spot and the chute column
  var GLASS_STARS = [
    [222, 158, 12, "#ffd166", 0.3],  [252, 190, 7,  "#ff5fa2", -0.4],
    [800, 152, 11, "#5fd0ff", 0.5],  [770, 186, 7,  "#7cf29c", -0.3],
    [232, 425, 9,  "#c792ff", 0.6],  [812, 402, 10, "#ff8f5f", -0.5],
    [545, 438, 8,  "#ff5fa2", 0.4]
  ];

  /* ---------------- drawing ---------------- */
  function draw() {
    ctx.clearRect(0, 0, W, H);

    var pulse = 0.5 + 0.5 * Math.sin(lightsT * 2.6);

    // ---- cabinet body (glossy white) ----
    var bodyG = ctx.createLinearGradient(0, 12, 0, H - 12);
    bodyG.addColorStop(0, "#ffffff");
    bodyG.addColorStop(0.5, "#eef3f9");
    bodyG.addColorStop(1, "#ccd8e6");
    rr(12, 12, W - 24, H - 24, 28);
    ctx.fillStyle = bodyG;
    ctx.fill();
    ctx.strokeStyle = "#a9bcd0";
    ctx.lineWidth = 2;
    ctx.stroke();

    // LED rim around the whole cabinet
    glow(THEME.main, 14 + pulse * 8);
    rr(18, 18, W - 36, H - 36, 24);
    ctx.strokeStyle = accA(0.65 + pulse * 0.3);
    ctx.lineWidth = 3;
    ctx.stroke();
    noGlow();

    // side LED pillars
    for (var s = 0; s < 2; s++) {
      var px = s === 0 ? 30 : W - 38;
      glow(THEME.main, 12);
      rr(px, 110, 8, H - 200, 4);
      ctx.fillStyle = accA(0.55 + pulse * 0.35);
      ctx.fill();
      noGlow();
    }

    // ---- marquee (light band matching the cabinet) ----
    rr(46, 26, W - 92, 66, 14);
    var mg = ctx.createLinearGradient(0, 26, 0, 92);
    mg.addColorStop(0, "#ffffff");
    mg.addColorStop(1, "#e4edf6");
    ctx.fillStyle = mg;
    ctx.fill();
    glow(THEME.main, 8);
    ctx.strokeStyle = accA(0.75);
    ctx.lineWidth = 2;
    ctx.stroke();
    noGlow();
    // glow line under marquee
    glow(THEME.main, 12);
    ctx.strokeStyle = accA(0.5 + pulse * 0.4);
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(60, 96);
    ctx.lineTo(W - 60, 96);
    ctx.stroke();
    noGlow();

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#14264d";
    glow(THEME.main, 6);
    ctx.font = "34px 'Jua', 'Malgun Gothic', sans-serif";
    ctx.fillText("먹방 가챠", W / 2, 51);
    noGlow();
    ctx.fillStyle = THEME.deep;
    ctx.font = "900 10px 'Noto Sans KR', sans-serif";
    ctx.fillText("M U K B A N G   G A C H A", W / 2, 76);
    // marquee deco stars — symmetric clusters left/right of the title
    star(140, 52, 11, "#ffd166", 0.2);
    star(178, 42, 6, "#ff5fa2", -0.4);
    star(196, 62, 7, THEME.main, 0.6);
    star(780, 52, 10, THEME.main, 0.4);
    star(742, 42, 6, "#7cf29c", 0.5);
    star(724, 62, 7, "#ff8f5f", -0.3);

    // ---- tank interior (bright, lit) ----
    var tg = ctx.createLinearGradient(0, TANK.top, 0, TANK.floor);
    tg.addColorStop(0, "#f4faff");
    tg.addColorStop(1, "#d9e8f6");
    ctx.fillStyle = tg;
    ctx.fillRect(TANK.left, TANK.top, TANK.right - TANK.left, TANK.floor - TANK.top);

    var sp = ctx.createRadialGradient(W / 2, TANK.top, 30, W / 2, TANK.top, 480);
    sp.addColorStop(0, "rgba(255,255,255,.5)");
    sp.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = sp;
    ctx.fillRect(TANK.left, TANK.top, TANK.right - TANK.left, TANK.floor - TANK.top);

    // interior LED strips
    glow(THEME.main, 10);
    ctx.strokeStyle = accA(0.4 + pulse * 0.3);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(TANK.left + 8, TANK.top + 8);
    ctx.lineTo(TANK.right - 8, TANK.top + 8);
    ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(TANK.left + 8, TANK.top + 8);
    ctx.lineTo(TANK.left + 8, TANK.floor - 8);
    ctx.moveTo(TANK.right - 8, TANK.top + 8);
    ctx.lineTo(TANK.right - 8, TANK.floor - 8);
    ctx.stroke();
    noGlow();

    // ---- chute shaft ----
    ctx.fillStyle = "rgba(20,60,110,.10)";
    ctx.fillRect(TANK.left, TANK.top, CHUTE.wallX - TANK.left, TANK.floor - TANK.top);
    glow(THEME.main, 14 + pulse * 10);
    ctx.strokeStyle = accA(0.5 + pulse * 0.4);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(CHUTE.cx, TANK.floor - 8, 36, 10, 0, 0, Math.PI * 2);
    ctx.stroke();
    noGlow();
    ctx.fillStyle = THEME.deep;
    ctx.font = "900 13px 'Noto Sans KR', sans-serif";
    "PRIZE".split("").forEach(function (ch, k) {
      ctx.fillText(ch, CHUTE.cx, CHUTE.openY + 34 + k * 22);
    });
    var chOff = (lightsT * 46) % 44;
    ctx.strokeStyle = accA(0.7);
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    for (var c = 0; c < 3; c++) {
      var cy = TANK.top + 60 + c * 44 + chOff;
      if (cy > CHUTE.openY - 4) continue;
      ctx.globalAlpha = 0.25 + 0.75 * (c / 3);
      ctx.beginPath();
      ctx.moveTo(CHUTE.cx - 12, cy);
      ctx.lineTo(CHUTE.cx, cy + 10);
      ctx.lineTo(CHUTE.cx + 12, cy);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // ---- floor ----
    var fg = ctx.createLinearGradient(0, TANK.floor - 6, 0, TANK.floor + 12);
    fg.addColorStop(0, "#c3d6e8");
    fg.addColorStop(1, "#a7bed4");
    ctx.fillStyle = fg;
    ctx.fillRect(CHUTE.wallX, TANK.floor - 4, TANK.right - CHUTE.wallX, 16);

    // ---- rail ----
    rr(TANK.left + 4, RAIL_Y - 7, TANK.right - TANK.left - 8, 14, 7);
    ctx.fillStyle = chromeGrad(RAIL_Y - 7, RAIL_Y + 7);
    ctx.fill();
    ctx.strokeStyle = "rgba(60,80,110,.4)";
    ctx.lineWidth = 1;
    ctx.stroke();

    // base first, so the prize ball can render on top of the door
    drawBase(pulse);

    // ---- balls (clipped to the glass + prize chute channel) ----
    ctx.save();
    ctx.beginPath();
    ctx.rect(TANK.left, TANK.top, TANK.right - TANK.left, TANK.floor - TANK.top + 4);
    ctx.rect(TANK.left, TANK.floor, CHUTE.wallX - TANK.left, PRIZE_Y - TANK.floor + 10);
    ctx.clip();
    for (var b = 0; b < balls.length; b++) drawBall(balls[b]);
    ctx.restore();

    // ---- chute divider wall ----
    rr(CHUTE.wallX - 6, CHUTE.openY, 12, TANK.floor - CHUTE.openY, 6);
    ctx.fillStyle = chromeGrad(CHUTE.openY, TANK.floor);
    ctx.fill();
    ctx.strokeStyle = "rgba(60,80,110,.35)";
    ctx.stroke();

    drawClaw();

    // ---- glass reflections + sticker stars ----
    ctx.save();
    ctx.beginPath();
    ctx.rect(TANK.left, TANK.top, TANK.right - TANK.left, TANK.floor - TANK.top);
    ctx.clip();
    ctx.fillStyle = "rgba(255,255,255,.10)";
    ctx.beginPath();
    ctx.moveTo(TANK.left + 90, TANK.top);
    ctx.lineTo(TANK.left + 200, TANK.top);
    ctx.lineTo(TANK.left + 40, TANK.floor);
    ctx.lineTo(TANK.left - 70, TANK.floor);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.07)";
    ctx.beginPath();
    ctx.moveTo(TANK.right - 170, TANK.top);
    ctx.lineTo(TANK.right - 120, TANK.top);
    ctx.lineTo(TANK.right - 260, TANK.floor);
    ctx.lineTo(TANK.right - 310, TANK.floor);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 0.85;
    GLASS_STARS.forEach(function (st) { star(st[0], st[1], st[2], st[3], st[4]); });
    ctx.globalAlpha = 1;
    ctx.restore();

    // ---- glass frame ----
    ctx.strokeStyle = "#f4f8fc";
    ctx.lineWidth = 6;
    ctx.strokeRect(TANK.left, TANK.top, TANK.right - TANK.left, TANK.floor - TANK.top);
    ctx.strokeStyle = "#9fb4c9";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(TANK.left - 3, TANK.top - 3, TANK.right - TANK.left + 6, TANK.floor - TANK.top + 6);

    // ---- under-cabinet LED glow ----
    glow(THEME.main, 18 + pulse * 10);
    rr(44, H - 34, W - 88, 6, 3);
    ctx.fillStyle = accA(0.6 + pulse * 0.35);
    ctx.fill();
    noGlow();
  }

  function drawBall(b) {
    var r = b.circleRadius;
    ctx.save();
    ctx.translate(b.position.x, b.position.y);
    ctx.rotate(b.angle);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI);
    var wg = ctx.createLinearGradient(0, 0, 0, r);
    wg.addColorStop(0, "#ffffff");
    wg.addColorStop(0.7, "#dfe4ef");
    wg.addColorStop(1, "#b9c3d6");
    ctx.fillStyle = wg;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, 0, r, Math.PI, Math.PI * 2);
    var cg = ctx.createRadialGradient(-r * 0.3, -r * 0.45, r * 0.1, 0, -r * 0.2, r * 1.15);
    cg.addColorStop(0, "#ffffff");
    cg.addColorStop(0.25, b.plugin.color);
    cg.addColorStop(1, shade(b.plugin.color, -0.35));
    ctx.fillStyle = cg;
    ctx.fill();
    ctx.fillStyle = "rgba(20,38,77,.20)";
    ctx.fillRect(-r, -1.5, r * 2, 3);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(20,38,77,.25)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(-r * 0.38, -r * 0.46, r * 0.24, r * 0.14, -0.6, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,.85)";
    ctx.fill();
    ctx.restore();
  }

  var shadeCache = {};
  function shade(hex, amt) {
    var key = hex + amt;
    if (shadeCache[key]) return shadeCache[key];
    var n = parseInt(hex.slice(1), 16);
    var r = (n >> 16) & 255, g = (n >> 8) & 255, bl = n & 255;
    r = Math.round(Math.max(0, Math.min(255, r + (amt < 0 ? r : 255 - r) * amt)));
    g = Math.round(Math.max(0, Math.min(255, g + (amt < 0 ? g : 255 - g) * amt)));
    bl = Math.round(Math.max(0, Math.min(255, bl + (amt < 0 ? bl : 255 - bl) * amt)));
    var out = "rgb(" + r + "," + g + "," + bl + ")";
    shadeCache[key] = out;
    return out;
  }

  function drawClaw() {
    var sw = Math.sin(swing.a) * 6;
    rr(clawX - 26, RAIL_Y - 14, 52, 28, 8);
    ctx.fillStyle = chromeGrad(RAIL_Y - 14, RAIL_Y + 14);
    ctx.fill();
    ctx.strokeStyle = "rgba(60,80,110,.5)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    var blink = Math.floor(lightsT * 3) % 2 === 0;
    glow("#ff3355", blink ? 10 : 0);
    ctx.fillStyle = blink ? "#ff5566" : "#8a2438";
    ctx.beginPath();
    ctx.arc(clawX, RAIL_Y - 4, 3.4, 0, Math.PI * 2);
    ctx.fill();
    noGlow();
    ctx.beginPath();
    ctx.moveTo(clawX, RAIL_Y + 12);
    ctx.lineTo(clawX + sw * 0.4, tipY - 24);
    ctx.strokeStyle = "#39435a";
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.strokeStyle = "rgba(255,255,255,.4)";
    ctx.lineWidth = 1.2;
    ctx.stroke();
    rr(clawX - 18 + sw * 0.4, tipY - 28, 36, 22, 8);
    ctx.fillStyle = chromeGrad(tipY - 28, tipY - 6);
    ctx.fill();
    ctx.strokeStyle = "rgba(60,80,110,.55)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    glow(THEME.main, 8);
    ctx.fillStyle = THEME.main;
    ctx.beginPath();
    ctx.arc(clawX + sw * 0.4, tipY - 17, 3, 0, Math.PI * 2);
    ctx.fill();
    noGlow();
    for (var side = -1; side <= 1; side += 2) {
      var px = clawX + side * 10 + sw * 0.4;
      var py = tipY - 8;
      var spread = 9 + prongOpen * 22;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#5a6478";
      ctx.lineWidth = 9;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.quadraticCurveTo(px + side * spread, py + 19, px + side * spread * 0.35, py + 36);
      ctx.stroke();
      ctx.strokeStyle = "#e6eaf2";
      ctx.lineWidth = 4.5;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.quadraticCurveTo(px + side * spread, py + 19, px + side * spread * 0.35, py + 36);
      ctx.stroke();
      ctx.fillStyle = "#c3c8d6";
      ctx.beginPath();
      ctx.arc(px + side * spread * 0.35, py + 36, 3.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawBase(pulse) {
    var by = BASE_Y, bh = BASE_H, cyMid = BASE_MID;

    // base front (white)
    rr(34, by, W - 68, bh, 18);
    var bg = ctx.createLinearGradient(0, by, 0, by + bh);
    bg.addColorStop(0, "#fbfdff");
    bg.addColorStop(1, "#d5e0ec");
    ctx.fillStyle = bg;
    ctx.fill();
    ctx.strokeStyle = "#b7c6d8";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // dark channel connecting the shaft hole to the prize door
    ctx.fillStyle = "#0c1524";
    ctx.fillRect(CHUTE.cx - 40, TANK.floor - 2, 80, (by + 24) - (TANK.floor - 2));

    // prize-out door under the chute, LED-rimmed
    rr(CHUTE.cx - 46, by + 12, 92, bh - 42, 14);
    ctx.fillStyle = "#0c1524";
    ctx.fill();
    glow(THEME.main, 12 + pulse * 8);
    ctx.strokeStyle = accA(0.65 + pulse * 0.3);
    ctx.lineWidth = 3;
    ctx.stroke();
    noGlow();
    rr(CHUTE.cx - 32, by + 24, 64, bh - 66, 10);
    ctx.fillStyle = "rgba(255,255,255,.08)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.18)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = THEME.deep;
    ctx.font = "900 12px 'Noto Sans KR', sans-serif";
    ctx.fillText("PRIZE OUT", CHUTE.cx, by + bh - 14);

    // shuffle button (circular, clickable)
    var ready = shuffleReady();
    var sb = SHUFFLE_BTN;
    if (ready) glow(THEME.main, 12 + pulse * 10);
    var btnG = ctx.createRadialGradient(sb.x - 8, sb.y - 8, 4, sb.x, sb.y, sb.r);
    if (ready) {
      btnG.addColorStop(0, shade(THEME.main, 0.55));
      btnG.addColorStop(0.55, THEME.main);
      btnG.addColorStop(1, THEME.deep);
    } else {
      btnG.addColorStop(0, "#d4dce8");
      btnG.addColorStop(1, "#9dabc0");
    }
    ctx.beginPath();
    ctx.arc(sb.x, sb.y, sb.r, 0, Math.PI * 2);
    ctx.fillStyle = btnG;
    ctx.fill();
    noGlow();
    ctx.strokeStyle = ready ? THEME.deep : "#8494ab";
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.fillStyle = ready ? THEME.btnText : "#f2f6fa";
    ctx.font = "20px 'Jua', sans-serif";
    ctx.fillText("셔플", sb.x, sb.y + 1);
    // cooldown sweep
    if (shuffleCd > 0) {
      ctx.beginPath();
      ctx.arc(sb.x, sb.y, sb.r + 5, -Math.PI / 2, -Math.PI / 2 + (shuffleCd / SHUFFLE_CD_MAX) * Math.PI * 2);
      ctx.strokeStyle = accA(0.85);
      ctx.lineWidth = 3.5;
      ctx.lineCap = "round";
      ctx.stroke();
    }

    // capsule counter — vertical layout on the right side of the base
    rr(716, cyMid - 52, 130, 104, 16);
    var cntG = ctx.createLinearGradient(0, cyMid - 52, 0, cyMid + 52);
    cntG.addColorStop(0, "#ffffff");
    cntG.addColorStop(1, "#e9f1f9");
    ctx.fillStyle = cntG;
    ctx.fill();
    glow(THEME.main, 10);
    ctx.strokeStyle = accA(0.55 + pulse * 0.25);
    ctx.lineWidth = 2;
    ctx.stroke();
    noGlow();
    var cbx = 781;
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";
    ctx.fillStyle = "#64789a";
    ctx.font = "900 14px 'Noto Sans KR', sans-serif";
    ctx.fillText("남은 캡슐", cbx, cyMid - 26);
    ctx.font = "900 8px 'Noto Sans KR', sans-serif";
    ctx.fillText("CAPSULES LEFT", cbx, cyMid - 12);
    var left = poolLeft();
    var lowPool = left <= 3 && phase !== "setup";
    ctx.font = "40px 'Jua', sans-serif";
    var numStr = String(left);
    var numW = ctx.measureText(numStr).width;
    var gx = cbx - (numW + 18) / 2;
    ctx.textAlign = "left";
    glow(THEME.main, 8);
    ctx.fillStyle = lowPool && pulse > 0.5 ? THEME.main : THEME.deep;
    ctx.fillText(numStr, gx, cyMid + 34);
    noGlow();
    ctx.fillStyle = "#64789a";
    ctx.font = "700 13px 'Noto Sans KR', sans-serif";
    ctx.fillText("개", gx + numW + 5, cyMid + 32);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
  }

  /* ---------------- main loop (with hidden-tab watchdog) ---------------- */
  var lastTs = 0, lastFrame = Date.now();
  function frame(dtSec) {
    lastFrame = Date.now();
    if (phase !== "setup" && engine) {
      for (var i = 0; i < FAST; i++) Matter.Engine.update(engine, 1000 / 60);
      update(Math.min(0.05, dtSec) * FAST);
      draw();
    }
  }
  function loop(ts) {
    requestAnimationFrame(loop);
    var dt = lastTs ? (ts - lastTs) / 1000 : 0.016;
    lastTs = ts;
    frame(dt);
  }
  requestAnimationFrame(loop);
  setInterval(function () {
    if (Date.now() - lastFrame > 200) frame(0.016);
  }, 100);
})();
</script>
</body>
