<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가챠 브래킷 — Bracket Gacha</title>
<style>
  :root {
    --blossom: #FBD3E0;
    --lavender: #E3DBFB;
    --mint: #CDEBDD;
    --peach: #FCE0CE;
    --butter: #FBF0C9;
    --sky: #D3E8FB;
    --ink: #6b4a5a;        /* soft plum text */
    --ink-soft: #a081909e;
    --card: #ffffff;
    --line: #f3d9e6;
    --accent: #e98bb3;     /* candy pink */
    --accent-deep: #c25c87;
    --win: #5cc4a0;
    --bust: #f08a96;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }

  body {
    font-family: "Pretendard", "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
    background:
      radial-gradient(circle at 18% 12%, #fff4f9 0%, transparent 55%),
      radial-gradient(circle at 82% 88%, #f1ecff 0%, transparent 55%),
      linear-gradient(160deg, #fff7fb, #fdeff6 55%, #f4eefe);
    color: var(--ink);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 18px 44px;
  }

  /* ---------- header + mascot ---------- */
  .topbar {
    width: 100%;
    max-width: 1040px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  .mascot { width: 64px; height: 64px; flex: none; transform-origin: 50% 100%; }
  .mascot.cheer { animation: cheer .6s ease infinite; }
  .mascot.celebrate { animation: hop .5s ease infinite; }
  @keyframes cheer { 0%,100%{transform:rotate(-6deg);} 50%{transform:rotate(6deg);} }
  @keyframes hop { 0%,100%{transform:translateY(0) scale(1);} 40%{transform:translateY(-10px) scale(1.05);} }
  .titles h1 { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
  .titles p { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }

  .stage {
    width: 100%;
    max-width: 1040px;
    flex: 1;
  }

  .clay {
    background: var(--card);
    border-radius: 26px;
    box-shadow: 0 14px 34px rgba(214,150,180,.20), inset 0 2px 0 rgba(255,255,255,.9), 0 0 0 1px var(--line);
    padding: 26px;
  }

  /* ---------- mode select ---------- */
  .modes { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; }
  .mode-card {
    cursor: pointer;
    border: none;
    text-align: center;
    border-radius: 22px;
    padding: 26px 22px;
    width: 220px;
    color: var(--ink);
    box-shadow: 0 12px 28px rgba(214,150,180,.18), inset 0 2px 0 rgba(255,255,255,.85);
    transition: transform .14s ease, box-shadow .2s ease;
    font-family: inherit;
  }
  .mode-card:hover { transform: translateY(-4px); box-shadow: 0 20px 38px rgba(214,150,180,.28), inset 0 2px 0 rgba(255,255,255,.85); }
  .mode-card:active { transform: translateY(-1px) scale(.99); }
  .mode-card.lck { background: linear-gradient(160deg, var(--sky), var(--lavender)); }
  .mode-card.muk { background: linear-gradient(160deg, var(--blossom), var(--peach)); }
  .mode-card .emoji { font-size: 40px; display: block; margin-bottom: 8px; }
  .mode-card h2 { font-size: 20px; font-weight: 800; }
  .mode-card .tag { font-size: 14px; color: var(--accent-deep); margin-top: 6px; font-weight: 600; }
  .mode-card p { font-size: 13px; color: var(--ink); opacity: .72; margin-top: 10px; line-height: 1.55; }
  .soon { display:inline-block; margin-top:12px; font-size:11px; font-weight:700; letter-spacing:1px; background:rgba(255,255,255,.6); color:var(--accent-deep); padding:4px 10px; border-radius:20px; }

  /* ---------- generic buttons ---------- */
  .btn {
    font-family: inherit; font-weight: 700; cursor: pointer;
    border: none; border-radius: 16px; padding: 12px 22px; font-size: 15px;
    color: #fff; background: linear-gradient(160deg, var(--accent), var(--accent-deep));
    box-shadow: 0 8px 18px rgba(226,120,160,.35), inset 0 1px 0 rgba(255,255,255,.4);
    transition: transform .1s ease, filter .15s ease, opacity .15s;
  }
  .btn:hover { filter: brightness(1.05); }
  .btn:active { transform: translateY(2px) scale(.99); }
  .btn.ghost { background: #fff; color: var(--accent-deep); box-shadow: inset 0 0 0 2px var(--line); }
  .btn.lav { background: linear-gradient(160deg, #b9a6ec, #8f78d6); box-shadow: 0 8px 18px rgba(143,120,214,.35), inset 0 1px 0 rgba(255,255,255,.4); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; filter: none; }
  .btn.big { padding: 15px 30px; font-size: 17px; border-radius: 18px; }

  .back { background:none;border:none;cursor:pointer;color:var(--ink-soft);font-family:inherit;font-size:13px;font-weight:600;margin-bottom:14px; }
  .back:hover { color: var(--accent-deep); }

  /* ---------- mukbang setup ---------- */
  .muk-setup { display: grid; grid-template-columns: 1fr 270px; gap: 22px; }
  textarea#foods {
    width: 100%; min-height: 280px; resize: vertical;
    font-family: inherit; font-size: 16px; line-height: 1.7; color: var(--ink);
    border: 2px solid var(--line); border-radius: 18px; padding: 16px 18px; background: #fffafc;
  }
  textarea#foods:focus { outline: none; border-color: var(--accent); }
  .hint { font-size: 13px; color: var(--ink-soft); margin-top: 10px; line-height: 1.7; }
  .hint code { background: var(--butter); color: #8a6a1e; padding: 1px 7px; border-radius: 7px; font-size: 12px; }
  .side h3 { font-size: 14px; color: var(--accent-deep); margin-bottom: 10px; font-weight: 800; }
  .stat { background: #fff6fa; border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; box-shadow: inset 0 0 0 1px var(--line); }
  .stat .k { font-size: 12px; color: var(--ink-soft); }
  .stat .v { font-size: 24px; font-weight: 800; color: var(--ink); }
  .stat .v small { font-size: 13px; font-weight: 600; color: var(--ink-soft); }

  /* ---------- tournament ---------- */
  .round-head { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom: 22px; }
  .round-head .pill { background: var(--lavender); color:#574a95; font-weight:800; font-size:14px; padding:7px 16px; border-radius: 20px; }
  .round-head h2 { font-size: 22px; font-weight: 800; }

  .matchups { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .vs {
    display: grid; grid-template-columns: 1fr 34px 1fr; align-items: center; gap: 8px;
    background: #fff8fb; border-radius: 20px; padding: 14px; box-shadow: inset 0 0 0 1px var(--line);
  }
  .vs .mid { text-align:center; font-weight:800; color: var(--accent); font-size: 13px; }
  .cap {
    position: relative; border-radius: 16px; padding: 16px 12px; text-align:center;
    font-weight: 700; font-size: 16px; color: var(--ink);
    min-height: 92px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    box-shadow: inset 0 -6px 0 rgba(0,0,0,.05), inset 0 2px 0 rgba(255,255,255,.8);
    transition: transform .2s ease, box-shadow .2s ease, opacity .25s;
  }
  .cap .dot { width: 30px; height: 30px; border-radius: 50%; box-shadow: inset 0 -4px 0 rgba(0,0,0,.08), inset 0 3px 0 rgba(255,255,255,.7); }
  .cap.shake { animation: shake .5s ease; }
  @keyframes shake { 0%,100%{transform:translate(0,0) rotate(0);} 20%{transform:translate(-3px,2px) rotate(-3deg);} 40%{transform:translate(3px,-2px) rotate(3deg);} 60%{transform:translate(-2px,-1px) rotate(-2deg);} 80%{transform:translate(2px,1px) rotate(2deg);} }
  .cap.win { transform: scale(1.05); box-shadow: 0 0 0 3px var(--win), 0 10px 22px rgba(92,196,160,.35); }
  .cap.lose { opacity: .4; filter: grayscale(.5); }
  .cap.bye { opacity: .55; font-style: italic; }
  .spark { position:absolute; inset:0; pointer-events:none; border-radius:16px; overflow:hidden; }

  .controls { display:flex; justify-content:center; gap:12px; margin-top: 26px; flex-wrap: wrap; }
  .rerolls { text-align:center; font-size:12px; color:var(--ink-soft); margin-top:10px; }

  /* ---------- champion ---------- */
  .champ { text-align:center; padding: 20px 0 6px; }
  .champ .crown { font-size: 50px; line-height: 1; margin-bottom: 2px; }
  .champ .who { font-size: 40px; font-weight: 900; margin: 0 0 8px; color: var(--accent-deep); }
  .champ .sub { color: var(--ink-soft); font-size: 15px; }
  .confetti { position: fixed; top:-12px; width:10px; height:14px; border-radius:3px; z-index: 50; pointer-events:none; }

  /* ---------- 3d gachapon stage ---------- */
  .gacha-stage {
    width: 100%; height: 340px; position: relative; margin-bottom: 18px;
    border-radius: 20px; overflow: hidden;
    background: radial-gradient(circle at 50% 32%, #efe3fb 0%, #d8c4f1 48%, #bda1df 100%);
    box-shadow: inset 0 2px 16px rgba(110,72,140,.22), inset 0 0 0 1px rgba(255,255,255,.35);
  }
  .gacha-stage canvas { display: block; }
  .bracket-wrap { width: 100%; overflow-x: auto; margin-bottom: 4px; padding: 4px 2px; }
  .bracket-wrap svg { width: 100%; height: auto; display: block; }
  .play-area { display: flex; gap: 16px; align-items: stretch; margin-bottom: 18px; }
  .play-area .gacha-stage { width: 320px; flex: none; height: 400px; margin-bottom: 0; }
  .play-area .bracket-wrap { flex: 1; min-width: 0; margin-bottom: 0; }
  body.gameview .stage { max-width: 1480px; }
  /* ---------- 상품 브래킷 (prize prediction) ---------- */
  .benched { display: inline-flex; gap: 8px; align-items: center; margin: 6px 0 12px; font-size: 13px; color: var(--ink-soft); }
  .benched .bt { background: #f3eef8; color: #7a6a90; border-radius: 12px; padding: 5px 11px; font-weight: 700; }
  .predict-area { display: flex; gap: 18px; align-items: flex-start; }
  .predict-area .bracket-wrap { flex: 1; min-width: 0; }
  .predict-area .pred-form { width: 300px; flex: none; }
  .pred-group { margin-bottom: 16px; }
  .pred-group h4 { font-size: 14px; color: var(--accent-deep); margin: 0 0 8px; font-weight: 800; }
  .pred-group label { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: #fff8fb; border-radius: 12px; padding: 8px 12px; margin-bottom: 8px; box-shadow: inset 0 0 0 1px var(--line); font-size: 13px; }
  .pred-group select { font-family: inherit; font-size: 14px; padding: 6px 10px; border-radius: 10px; border: 1.5px solid var(--line); background: #fff; color: var(--ink); }
  .pred-group select:disabled { opacity: .5; }
  .series { display: flex; flex-direction: column; gap: 8px; background: #fff; border-radius: 16px; padding: 14px 16px; box-shadow: inset 0 0 0 1px var(--line); margin: 0 auto 10px; max-width: 520px; }
  .series .srow { display: flex; align-items: center; gap: 12px; }
  .series .steam { width: 56px; font-weight: 800; font-size: 16px; }
  .series .pips { display: flex; gap: 6px; }
  .series .pip { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
  .series .pip.o { background: #185fa5; color: #fff; }
  .series .pip.x { border: 1.5px solid var(--line); color: var(--ink-soft); }
  @media (max-width: 820px) { .predict-area { flex-direction: column; } .predict-area .pred-form { width: 100%; } }
  .pb { max-width: 900px; margin: 0 auto; }
  .pred-row { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
  .pred-row .pred-group { min-width: 220px; }
  .sim-stage { position: relative; min-height: 480px; width: 100%; }
  .showdown { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; background: rgba(255,247,251,0.97); border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity .35s; padding: 18px 14px; }
  .showdown.show { opacity: 1; pointer-events: auto; }
  .vs-header { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 780px; gap: 16px; }
  .vs-header .fighter { flex: 1; }
  .vs-header .fighter.right { text-align: right; }
  .vs-header .fname { font-size: 26px; font-weight: 900; color: var(--c); }
  .vs-mid { font-weight: 900; color: var(--accent-deep); text-align: center; font-size: 18px; line-height: 1.2; }
  .vs-mid small { font-weight: 700; color: var(--ink-soft); font-size: 12px; }
  .score-row { display: flex; justify-content: space-between; width: 100%; max-width: 780px; margin-top: 10px; }
  .sbar { display: flex; gap: 7px; }
  .sbar.rev { flex-direction: row-reverse; }
  .sbar .slot { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; background: #fff; box-shadow: inset 0 0 0 1.5px var(--line); color: #cbb9c6; }
  .sbar .slot.o { background: #1f7d5b; color: #fff; box-shadow: none; }
  .sbar .slot.x { background: #f4dde3; color: #b23a4a; box-shadow: none; }
  .showdown .gacha-stage { width: 340px; height: 300px; margin-top: 14px; }
  .ov { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; border-radius: 20px; padding: 16px; overflow: auto; background: rgba(247,240,250,0.55); }
  .ov-card { background: #fff; border-radius: 20px; padding: 22px 26px; box-shadow: 0 16px 40px rgba(150,110,150,.22), inset 0 1px 0 rgba(255,255,255,.8); width: 100%; max-width: 620px; }
  .pred-row .pred-group { width: 168px; min-width: 0; }
  .pred-group h4 { margin-bottom: 6px; }
  .pred-group label { flex-direction: column; align-items: stretch; gap: 4px; padding: 6px 10px; margin-bottom: 6px; }
  .pred-group label span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; color: var(--ink-soft); }
  .pred-group select { width: 150px; }
  .gacha-label {
    position: absolute; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: #fff; color: var(--accent-deep); font-weight: 800; font-size: 24px;
    padding: 10px 26px; border-radius: 20px; white-space: nowrap; z-index: 6;
    box-shadow: 0 12px 26px rgba(226,120,160,.32), inset 0 1px 0 rgba(255,255,255,.6);
  }

  @media (max-width: 820px) {
    .modes, .muk-setup { grid-template-columns: 1fr; }
    .play-area { flex-direction: column; }
    .play-area .gacha-stage { width: 100%; height: 300px; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <svg class="mascot" id="mascot" viewBox="0 0 100 100" aria-hidden="true">
      <defs>
        <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
          <feDropShadow dx="0" dy="1.4" stdDeviation="1.5" flood-color="#d9c1d3" flood-opacity="0.5"/>
        </filter>
      </defs>
      <ellipse cx="50" cy="96" rx="19" ry="3.5" fill="#eccfdd" opacity=".5"/>
      <!-- tail puff -->
      <circle cx="83" cy="78" r="7" fill="#fff" filter="url(#soft)"/>
      <!-- body powder-puff -->
      <g fill="#fff" filter="url(#soft)">
        <circle cx="37" cy="84" r="12"/>
        <circle cx="63" cy="84" r="12"/>
        <circle cx="50" cy="88" r="12"/>
        <circle cx="50" cy="75" r="10"/>
      </g>
      <ellipse cx="42" cy="95" rx="5.6" ry="4.2" fill="#fff" filter="url(#soft)"/>
      <ellipse cx="58" cy="95" rx="5.6" ry="4.2" fill="#fff" filter="url(#soft)"/>
      <!-- fluffy scalloped head ring (incl. drop ears) -->
      <g fill="#fff" filter="url(#soft)">
        <circle cx="50" cy="13" r="9"/>
        <circle cx="36" cy="15" r="8.5"/>
        <circle cx="64" cy="15" r="8.5"/>
        <circle cx="23" cy="25" r="9.5"/>
        <circle cx="77" cy="25" r="9.5"/>
        <circle cx="15" cy="40" r="10"/>
        <circle cx="85" cy="40" r="10"/>
        <circle cx="15" cy="55" r="10.5"/>
        <circle cx="85" cy="55" r="10.5"/>
        <circle cx="28" cy="60" r="10.5"/>
        <circle cx="72" cy="60" r="10.5"/>
        <circle cx="40" cy="63" r="10.5"/>
        <circle cx="60" cy="63" r="10.5"/>
        <circle cx="50" cy="64" r="11"/>
      </g>
      <!-- smooth face fill over inner seams -->
      <circle cx="50" cy="40" r="26" fill="#fff"/>
      <circle cx="32" cy="44" r="13" fill="#fff"/>
      <circle cx="68" cy="44" r="13" fill="#fff"/>
      <circle cx="50" cy="52" r="13" fill="#fff"/>
      <ellipse cx="16" cy="58" rx="6" ry="9" fill="#f2e6ee" opacity=".7"/>
      <ellipse cx="84" cy="58" rx="6" ry="9" fill="#f2e6ee" opacity=".7"/>
      <!-- dark round eyes in soft halos -->
      <ellipse cx="39.5" cy="40" rx="7" ry="7.4" fill="#efe3eb"/>
      <ellipse cx="60.5" cy="40" rx="7" ry="7.4" fill="#efe3eb"/>
      <circle cx="39.5" cy="40" r="4.9" fill="#3a2b33" id="eyeL"/>
      <circle cx="60.5" cy="40" r="4.9" fill="#3a2b33" id="eyeR"/>
      <circle cx="41.3" cy="38.1" r="1.7" fill="#fff"/>
      <circle cx="62.3" cy="38.1" r="1.7" fill="#fff"/>
      <circle cx="37.8" cy="41.7" r="0.9" fill="#fff" opacity=".75"/>
      <circle cx="58.8" cy="41.7" r="0.9" fill="#fff" opacity=".75"/>
      <!-- rosy cheeks -->
      <ellipse cx="30" cy="49" rx="4.8" ry="3.1" fill="#fcd0de" opacity=".85"/>
      <ellipse cx="70" cy="49" rx="4.8" ry="3.1" fill="#fcd0de" opacity=".85"/>
      <!-- black button nose + muzzle -->
      <path d="M44.6 46 Q50 45 55.4 46 Q53.7 51.6 50 52.6 Q46.3 51.6 44.6 46 Z" fill="#2f242a"/>
      <ellipse cx="49.3" cy="47.2" rx="2" ry="1" fill="#6b5560" opacity=".7"/>
      <path d="M50 52.6 L50 55.2" stroke="#dcbccb" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <path id="mouth" d="M45 55 Q50 59 55 55" stroke="#b06a86" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- groomed topknot + bow -->
      <g fill="#fff" filter="url(#soft)">
        <circle cx="45" cy="9" r="5.2"/>

      <g transform="translate(58,7) rotate(16)">
        <path d="M0 0 L-8.5 -5 L-8.5 5 Z" fill="#fbb6cf" stroke="#e98bb3" stroke-width="1"/>

    </svg>
    <div class="titles">
      <h1>가챠 브래킷 <span style="opacity:.5;font-weight:500;font-size:16px">Bracket Gacha</span></h1>
      <p>캡슐을 뽑아 우승자를 가려요 · pick a capsule, crown a winner</p>
    </div>
  </div>

  <div class="stage" id="stage"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  "use strict";

  /* =========================================================
     small sound kit — synthesized, no audio files
     ========================================================= */
  var AC = null;
  function ac() { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return AC; }
  function tone(freq, dur, type, vol, delay) {
    var c = ac(); if (!c) return;
    var t0 = c.currentTime + (delay || 0);
    var o = c.createOscillator(), g = c.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol || 0.18, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(c.destination);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noise(dur, vol) {
    var c = ac(); if (!c) return;
    var n = Math.floor(c.sampleRate * dur);
    var buf = c.createBuffer(1, n, c.sampleRate), d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    var s = c.createBufferSource(); s.buffer = buf;
    var g = c.createGain(); g.gain.value = vol || 0.12;
    s.connect(g); g.connect(c.destination); s.start();
  }
  var SFX = {
    rattle: function () { noise(0.18, 0.08); tone(180, 0.12, "square", 0.05); },
    pop:    function () { tone(520, 0.08, "triangle", 0.16); tone(880, 0.12, "sine", 0.12, 0.04); },
    win:    function () { [523, 659, 784, 1047].forEach(function (f, i) { tone(f, 0.22, "triangle", 0.16, i * 0.09); }); },
    crown:  function () { [523, 659, 784, 1047, 1319].forEach(function (f, i) { tone(f, 0.3, "triangle", 0.18, i * 0.1); }); },
    click:  function () { tone(420, 0.05, "sine", 0.1); }
  };

  /* =========================================================
     mascot expressions
     ========================================================= */
  var mascot = document.getElementById("mascot");
  var mouth = document.getElementById("mouth");
  function mood(m) {
    mascot.setAttribute("class", "mascot");
    if (m === "cheer") { mascot.classList.add("cheer"); mouth.setAttribute("d", "M43 54 Q50 63 57 54"); }
    else if (m === "celebrate") { mascot.classList.add("celebrate"); mouth.setAttribute("d", "M42 53 Q50 65 58 53"); }
    else if (m === "sad") { mouth.setAttribute("d", "M44 60 Q50 54 56 60"); }
    else { mouth.setAttribute("d", "M45 55 Q50 59 55 55"); }
  }

  /* =========================================================
     pastel capsule colours
     ========================================================= */
  var PASTELS = ["#FBD3E0", "#E3DBFB", "#CDEBDD", "#FCE0CE", "#FBF0C9", "#D3E8FB", "#F5D0E8", "#D7F0E6"];
  function colorFor(i) { return PASTELS[i % PASTELS.length]; }
  function hexNum(h) { var s = String(h).replace("#", ""); if (s.length === 3) s = s.replace(/(.)/g, "$1$1"); return parseInt(s, 16) || 0xffffff; }

  /* =========================================================
     bracket / gacha core logic  (pure, testable)
     ========================================================= */
  // parse the 먹방 textarea. one item per line, "name * N" / "name xN" => N copies.
  function parseFoods(text) {
    var items = [];
    text.split(/\r?\n/).forEach(function (raw) {
      var line = raw.trim();
      if (!line) return;
      var m = line.match(/^(.*?)\s*[*x×]\s*(\d+)\s*$/i);
      var name = line, qty = 1;
      if (m && m[1].trim()) { name = m[1].trim(); qty = parseInt(m[2], 10) || 1; }
      qty = Math.max(1, Math.min(qty, 64));
      for (var i = 0; i < qty; i++) items.push(name);
    });
    return items;
  }
  function nextPow2(n) { var p = 1; while (p < n) p *= 2; return Math.max(2, p); }
  function shuffle(a) { for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

  // build seeded round-1 entrants, padding with byes so byes always face a real item.
  function seedEntrants(names) {
    var size = nextPow2(names.length);
    var ents = shuffle(names.slice()).map(function (n, i) { return { name: n, color: colorFor(i), bye: false }; });
    while (ents.length < size) ents.push({ name: "부전승", color: "#eee", bye: true });
    // pair i vs size-1-i  => byes (pushed last) meet the earliest real items
    var ordered = [];
    for (var i = 0; i < size / 2; i++) { ordered.push(ents[i]); ordered.push(ents[size - 1 - i]); }
    return ordered;
  }
  function pairUp(ents) {
    var ms = [];
    for (var i = 0; i < ents.length; i += 2) ms.push({ a: ents[i], b: ents[i + 1], winner: null });
    return ms;
  }
  // resolve a matchup: byes auto-advance, otherwise a true 50/50 pull.
  function pull(m) {
    if (m.a.bye && !m.b.bye) return m.b;
    if (m.b.bye && !m.a.bye) return m.a;
    return Math.random() < 0.5 ? m.a : m.b;
  }

  /* =========================================================
     3D gachapon machine  (Three.js, lightweight custom physics)
     ========================================================= */
  function createGacha(container) {
    if (typeof THREE === "undefined" || !container) {
      return { dispense: function (item, cb) { setTimeout(function () { cb && cb(); }, 500); }, destroy: function () {} };
    }
    var W = container.clientWidth || 640, H = container.clientHeight || 340;
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(36, W / H, 0.1, 100);
    camera.position.set(0, 0.7, 10.8);
    camera.lookAt(0, 0.6, 0);
    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(W, H);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    var dir = new THREE.DirectionalLight(0xffffff, 0.75); dir.position.set(3, 7, 6); scene.add(dir);
    var p1 = new THREE.PointLight(0xffc1dd, 0.5, 60); p1.position.set(-5, 2, 5); scene.add(p1);
    var p2 = new THREE.PointLight(0xbfd4ff, 0.5, 60); p2.position.set(5, 1, 4); scene.add(p2);

    var DOME_R = 2.0, DOME_Y = 1.6;
    var C = new THREE.Vector3(0, DOME_Y, 0);

    // ----- machine body -----
    var base = new THREE.Mesh(new THREE.CylinderGeometry(1.9, 2.2, 1.7, 48),
      new THREE.MeshPhongMaterial({ color: 0xf2a9cb, shininess: 60, specular: 0x9a5a78 }));
    base.position.y = -1.25; scene.add(base);
    var collar = new THREE.Mesh(new THREE.TorusGeometry(1.82, 0.2, 18, 48),
      new THREE.MeshPhongMaterial({ color: 0xdd84ac, shininess: 80 }));
    collar.position.y = -0.35; collar.rotation.x = Math.PI / 2; scene.add(collar);
    var chute = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.1, 0.5),
      new THREE.MeshPhongMaterial({ color: 0x9a8ad0, shininess: 40 }));
    chute.position.set(0, -1.05, 1.95); scene.add(chute);
    var chuteHole = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.72, 0.18),
      new THREE.MeshBasicMaterial({ color: 0x5a4b86 }));
    chuteHole.position.set(0, -1.05, 2.18); scene.add(chuteHole);
    var knob = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.34, 0.3, 24),
      new THREE.MeshPhongMaterial({ color: 0xbfe6cf, shininess: 90 }));
    knob.rotation.x = Math.PI / 2; knob.position.set(0, -0.45, 2.2); scene.add(knob);
    var knobDot = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.34, 16),
      new THREE.MeshPhongMaterial({ color: 0xffffff }));
    knobDot.rotation.x = Math.PI / 2; knobDot.position.set(0, -0.45, 2.25); scene.add(knobDot);

    // ----- glass dome -----
    var dome = new THREE.Mesh(new THREE.SphereGeometry(DOME_R, 48, 32),
      new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.13, shininess: 110, specular: 0xffffff, side: THREE.FrontSide }));
    dome.position.copy(C); dome.renderOrder = 20; dome.material.depthWrite = false; scene.add(dome);

    // ----- capsules -----
    var PAL = [0xF59CC0, 0xB9A4EE, 0x8FD9B6, 0xF7C49B, 0xF2DE8A, 0x9FC7F2, 0xEFA6D6, 0x9FD9C8];
    var caps = [];
    function makeCapsule(colorHex) {
      var r = 0.46, g = new THREE.Group();
      var top = new THREE.Mesh(new THREE.SphereGeometry(r, 22, 14, 0, Math.PI * 2, 0, Math.PI / 2),
        new THREE.MeshPhongMaterial({ color: colorHex, shininess: 80, specular: 0xffffff, emissive: colorHex, emissiveIntensity: 0.12 }));
      var bot = new THREE.Mesh(new THREE.SphereGeometry(r, 22, 14, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2),
        new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 70, specular: 0xffffff }));
      var band = new THREE.Mesh(new THREE.TorusGeometry(r * 0.98, 0.055, 8, 26),
        new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 60 }));
      band.rotation.x = Math.PI / 2;
      g.add(top, bot, band);
      g.userData = { top: top, bot: bot, band: band, r: r, vel: new THREE.Vector3(), spin: new THREE.Vector3(), frozen: false };
      return g;
    }
    function addCapsule() {
      var c = makeCapsule(PAL[Math.floor(Math.random() * PAL.length)]);
      c.position.set((Math.random() - 0.5) * 2.2, DOME_Y + (Math.random() - 0.3) * 1.6, (Math.random() - 0.5) * 2.2);
      c.userData.vel.set((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3);
      c.userData.spin.set(Math.random() * 3, Math.random() * 3, Math.random() * 3);
      scene.add(c); caps.push(c);
    }
    for (var ci = 0; ci < 13; ci++) addCapsule();

    var GRAV = 9.5;
    function physics(dt) {
      var n = caps.length, i, c;
      for (i = 0; i < n; i++) {
        c = caps[i]; if (c.userData.frozen) continue;
        var v = c.userData.vel;
        v.y -= GRAV * dt;
        c.position.addScaledVector(v, dt);
        var off = c.position.clone().sub(C);
        var d = off.length(), maxd = DOME_R - c.userData.r;
        if (d > maxd) {
          off.multiplyScalar(1 / (d || 1));
          c.position.copy(C).addScaledVector(off, maxd);
          var vn = v.dot(off);
          if (vn > 0) v.addScaledVector(off, -1.5 * vn);
          v.multiplyScalar(0.9);
        }
        c.rotation.x += c.userData.spin.x * dt;
        c.rotation.y += c.userData.spin.y * dt;
      }
      for (var a = 0; a < n; a++) {
        for (var b = a + 1; b < n; b++) {
          var ca = caps[a], cb = caps[b];
          if (ca.userData.frozen || cb.userData.frozen) continue;
          var diff = ca.position.clone().sub(cb.position);
          var dist = diff.length(), min = ca.userData.r + cb.userData.r;
          if (dist > 0 && dist < min) {
            diff.multiplyScalar(1 / dist);
            var push = (min - dist) / 2;
            ca.position.addScaledVector(diff, push);
            cb.position.addScaledVector(diff, -push);
          }
        }
      }
    }
    function shake() {
      caps.forEach(function (c) {
        if (c.userData.frozen) return;
        c.userData.vel.x += (Math.random() - 0.5) * 10;
        c.userData.vel.y += Math.random() * 9 + 3;
        c.userData.vel.z += (Math.random() - 0.5) * 10;
      });
    }

    // ----- tween queue (driven by render loop) -----
    var tweens = [];
    function tween(dur, onU, onEnd) { tweens.push({ t: 0, dur: dur, onU: onU, onEnd: onEnd }); }

    // ----- reveal overlay -----
    function showLabel(text) {
      var el = document.createElement("div");
      el.className = "gacha-label"; el.textContent = text; container.appendChild(el);
      el.animate([{ opacity: 0, transform: "translateX(-50%) translateY(16px) scale(.82)" },
                  { opacity: 1, transform: "translateX(-50%) translateY(0) scale(1)" }],
                 { duration: 320, fill: "forwards", easing: "ease-out" });
      return el;
    }
    function sparkle() {
      for (var i = 0; i < 12; i++) {
        var s = document.createElement("div");
        s.textContent = "✨";
        s.style.cssText = "position:absolute;left:" + (38 + Math.random() * 24) + "%;top:" + (26 + Math.random() * 30) + "%;font-size:" + (14 + Math.random() * 18) + "px;pointer-events:none;z-index:5;";
        container.appendChild(s);
        (function (sp) {
          sp.animate([{ opacity: 0, transform: "scale(.4) translateY(6px)" },
                      { opacity: 1, transform: "scale(1.1) translateY(-8px)" },
                      { opacity: 0, transform: "scale(.8) translateY(-28px)" }],
                     { duration: 800 + Math.random() * 500 }).onfinish = function () { sp.remove(); };
        })(s);
      }
    }

    // ----- one pull -----
    function dispense(item, onDone, opts) {
      opts = opts || {};

      var shakes = 0;
      var timer = setInterval(function () {
        shake(); SFX.rattle(); shakes++;
        if (shakes >= shakesNeeded) { clearInterval(timer); pick(); }
      }, 170);
      function pick() {
        var chosen = null, best = Infinity;
        caps.forEach(function (c) {
          if (c.userData.frozen) return;
          var score = c.position.y - c.position.z * 0.3;
          if (score < best) { best = score; chosen = c; }
        });
        if (!chosen) { onDone && onDone(); return; }
        chosen.userData.frozen = true;
        if (!opts.mystery) chosen.userData.top.material.color.setHex(item.color);
        chosen.userData.top.renderOrder = chosen.userData.bot.renderOrder = chosen.userData.band.renderOrder = 30;
        var p0 = chosen.position.clone();
        var pChute = new THREE.Vector3(0, -1.0, 2.5);
        var pReveal = new THREE.Vector3(0, 0.7, 5.6);
        tween(0.45, function (k) {
          chosen.position.lerpVectors(p0, pChute, k);
          chosen.rotation.y += 0.12;
        }, function () {
          SFX.pop();
          var rs = { x: chosen.rotation.x, y: chosen.rotation.y, z: chosen.rotation.z };
          tween(0.55, function (k) {
            chosen.position.lerpVectors(pChute, pReveal, k);
            var sc = 1 + 1.6 * k; chosen.scale.set(sc, sc, sc);
            chosen.rotation.set(rs.x * (1 - k), rs.y * (1 - k), rs.z * (1 - k)); // settle upright
          }, function () { chosen.rotation.set(0, 0, 0); open(chosen); });
        });

          tween(0.45, function (k) {
            top.position.y = 0.2 * k;
            top.rotation.x = -0.05 * k;
          }, function () {
            mood("celebrate");
            var lbl = showLabel(item.label); sparkle(); SFX.win();
            setTimeout(function () {
              if (lbl) lbl.remove();

    // ----- render loop -----

    loop();

    function onResize() {

    function destroy() {

    }

    return { dispense: dispense, destroy: destroy };
  }

  function roundName(teams) {

  function truncName(s) { s = String(s); return s.length > 8 ? s.slice(0, 7) + "…" : s; }

  // draw the whole single-elimination bracket as one SVG, styled by current state
  function renderBracketSVG() {
    var cols = muk.cols, R = muk.R;
    var boxW = 120, boxH = 34, vGap = 16, colGap = 52, colStep = boxW + colGap;
    var centers = [];
    centers[0] = cols[0].map(function (_, i) { return i * (boxH + vGap) + boxH / 2; });
    for (var c = 1; c <= R; c++) {
      var pl = cols[c - 1].length, nm = Math.floor(pl / 2);
      centers[c] = [];
      for (var j = 0; j < cols[c].length; j++) {
        centers[c][j] = (j < nm)
          ? (centers[c - 1][2 * j] + centers[c - 1][2 * j + 1]) / 2
          : centers[c - 1][pl - 1];
      }
    }
    var totalH = cols[0].length * (boxH + vGap) - vGap;
    var totalW = R * colStep + boxW;
    var p = [];
    p.push('<g fill="none" stroke="#e3c9da" stroke-width="2">');
    for (var c2 = 1; c2 <= R; c2++) {
      var pl2 = cols[c2 - 1].length, nm2 = Math.floor(pl2 / 2);
      var xcr = (c2 - 1) * colStep + boxW, xpl = c2 * colStep, midX = (xcr + xpl) / 2;
      for (var j2 = 0; j2 < cols[c2].length; j2++) {
        if (j2 < nm2) {
          var yT = centers[c2 - 1][2 * j2], yB = centers[c2 - 1][2 * j2 + 1], yP = centers[c2][j2];
          p.push('<path d="M' + xcr + ' ' + yT + ' H' + midX + ' V' + yB + ' M' + xcr + ' ' + yB + ' H' + midX + ' M' + midX + ' ' + yP + ' H' + xpl + '"/>');
        } else {
          p.push('<path d="M' + xcr + ' ' + centers[c2][j2] + ' H' + xpl + '"/>');
        }
      }
    }
    p.push('</g>');
    for (var c3 = 0; c3 <= R; c3++) {
      for (var i = 0; i < cols[c3].length; i++) {
        var ent = cols[c3][i];
        var x = c3 * colStep, y = centers[c3][i] - boxH / 2;
        var fill = "#ffffff", stroke = "#f0d9e6", dash = "", txt = "#6b4a5a", op = "1", weight = "600", dot = "", name = "?", champ = (c3 === R);
        if (!ent) { stroke = "#e6d2e0"; dash = ' stroke-dasharray="4 4"'; txt = "#bda7b6"; }
        else {
          name = truncName(ent.name); dot = ent.bye ? "#dcd0d8" : ent.color;
          if (champ) { fill = "#fff7da"; stroke = "#f0c244"; txt = "#8a6a1e"; weight = "800"; }
          else {
            var par = cols[c3 + 1] ? cols[c3 + 1][Math.floor(i / 2)] : null;
            if (par) { if (par === ent) { fill = "#e7f8f0"; stroke = "#74cdab"; txt = "#1f7d5b"; } else { op = "0.42"; txt = "#a594a0"; } }
          }
          if (ent.bye) txt = "#bda7b6";
        }
        p.push('<g opacity="' + op + '">');
        p.push('<rect x="' + x + '" y="' + y + '" width="' + boxW + '" height="' + boxH + '" rx="9" fill="' + fill + '" stroke="' + stroke + '" stroke-width="1.6"' + dash + '/>');
        if (ent) p.push('<circle cx="' + (x + 16) + '" cy="' + (y + boxH / 2) + '" r="7" fill="' + dot + '"/>');
        p.push('<text x="' + (ent ? x + 30 : x + boxW / 2) + '" y="' + (y + boxH / 2 + 5) + '" font-size="15" font-weight="' + weight + '" fill="' + txt + '"' + (ent ? '' : ' text-anchor="middle"') + '>' + escapeHtml(name) + '</text>');
        if (champ && ent) p.push('<text x="' + (x + boxW - 6) + '" y="' + (y + boxH / 2 + 6) + '" font-size="17" text-anchor="end">👑</text>');
        p.push('</g>');
      }
    }
    return '<svg viewBox="0 0 ' + totalW + ' ' + totalH + '" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block;overflow:visible">' + p.join("") + '</svg>';
  }

  function renderMukRound(autoStart) {
    var teams = muk.cols[muk.roundNo - 1].length;
    var isFinal = muk.cols[muk.roundNo].length === 1;
    show(
      '<div class="clay">' +
        '<button class="back" id="back">← 모드 선택</button>' +
        '<div class="round-head"><span class="pill">라운드 ' + muk.roundNo + '/' + muk.R + '</span><h2>' + roundName(teams) + '</h2></div>' +
        '<div class="play-area">' +
          '<div class="gacha-stage" id="gachaStage"></div>' +
          '<div class="bracket-wrap" id="bracketTree"></div>' +
        '</div>' +
        '<div class="controls" id="ctrl">' +
          (autoStart ? '' : '<button class="btn big" id="reveal">' + (isFinal ? "우승자 뽑기 👑" : "결과 공개 ✨") + '</button>') +
        '</div>' +
        '<div class="rerolls" id="rr"></div>' +
      '</div>'
    );
    redrawBracket();
    mood("idle");
    document.getElementById("back").onclick = function () { SFX.click(); renderMukSetup(); };
    var revealBtn = document.getElementById("reveal");
    if (revealBtn) revealBtn.onclick = function () { revealRound(); };
    if (muk.rerolls > 0) document.getElementById("rr").textContent = "이번 라운드 리롤 " + muk.rerolls + "회";
    destroyGacha();
    muk.gacha = createGacha(document.getElementById("gachaStage"));
    if (autoStart) setTimeout(revealRound, 350); // 다음 라운드 starts drawing automatically
  }

  function capHtml(ent, id) {
    return '<div class="cap' + (ent.bye ? ' bye' : '') + '" id="cap-' + id + '">' +
      '<span class="dot" style="background:' + ent.color + '"></span>' +
      '<span>' + escapeHtml(ent.name) + '</span>' +
      '<span class="spark"></span></div>';
  }
  function escapeHtml(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }

  // dispense a capsule for each match in the current round, filling the bracket
  function revealRound() {
    var ctrl = document.getElementById("ctrl");
    if (ctrl) ctrl.innerHTML = "";
    var prev = muk.cols[muk.roundNo - 1];
    var col = muk.cols[muk.roundNo];
    var numM = Math.floor(prev.length / 2);
    for (var k = 0; k < col.length; k++) col[k] = null; // reroll-safe reset
    redrawBracket();
    mood("cheer");
    var isFinal = col.length === 1;
    var i = 0;
    function step() {
      if (i >= col.length) { afterReveal(isFinal); return; }
      if (i < numM) {
        var w = pull({ a: prev[2 * i], b: prev[2 * i + 1] });
        var idx = i;
        muk.gacha.dispense({ label: w.name, color: hexNum(w.color) }, function () {
          muk.cols[muk.roundNo][idx] = w;
          redrawBracket();
          i++;
          setTimeout(step, 300);
        });
      } else {
        // odd one out — advances on a bye, no capsule pulled
        muk.cols[muk.roundNo][i] = prev[prev.length - 1];
        redrawBracket();
        i++;
        setTimeout(step, 250);
      }
    }
    step();
  }

  function afterReveal(isFinal) {
    if (isFinal) { return champion(muk.cols[muk.R][0]); }
    var ctrl = document.getElementById("ctrl");
    ctrl.innerHTML =
      '<button class="btn ghost" id="reroll">🎲 이 라운드 리롤</button>' +
      '<button class="btn big lav" id="next">다음 라운드 ▶</button>';
    document.getElementById("reroll").onclick = function () {
      SFX.click();
      muk.rerolls++;
      document.getElementById("rr").textContent = "이번 라운드 리롤 " + muk.rerolls + "회";
      document.getElementById("ctrl").innerHTML = "";
      revealRound();
    };
    document.getElementById("next").onclick = function () {
      SFX.click();
      muk.roundNo++;
      muk.rerolls = 0;
      renderMukRound(true);
    };
  }

  function champion(winner) {
    destroyGacha();
    mood("celebrate");
    SFX.crown();
    show(
      '<div class="clay">' +
        '<div class="champ">' +
          '<div class="crown">👑</div>' +
          '<div class="sub">오늘의 우승 메뉴</div>' +
          '<div class="who">' + escapeHtml(winner.name) + '</div>' +
        '</div>' +
        '<div class="controls">' +
          '<button class="btn ghost" id="again">다시 하기</button>' +
          '<button class="btn" id="home2">처음으로</button>' +
        '</div>' +
      '</div>'
    );
    confetti();
    document.getElementById("again").onclick = function () { SFX.click(); renderMukSetup(); };
    document.getElementById("home2").onclick = function () { SFX.click(); exitMode(); };
  }

  /* =========================================================
     상품 브래킷 챌린지 — prize prediction bracket (LCK teams)
     ========================================================= */
  var LCK_TEAMS = [
    { name: "SKT T1", color: "#E2012D" }, { name: "Gen.G", color: "#B68A2E" },
    { name: "Hanwha", color: "#F4801F" }, { name: "Dplus KIA", color: "#16385C" },
    { name: "KT", color: "#8E1B3B" }, { name: "Kwangdong", color: "#2FA84F" },
    { name: "Nongshim", color: "#D7263D" }, { name: "BRION", color: "#F2A900" },
    { name: "DRX", color: "#3257C5" }, { name: "BNK FearX", color: "#1AAEB6" }
  ];
  var teamByName = {}; LCK_TEAMS.forEach(function (t) { teamByName[t.name] = t; });

  var prize = { cols: [], pred: [], act: [], benched: [], gacha: null, bustAt: null, match: null };

  function drawSeed() {
    var pool = shuffle(LCK_TEAMS.slice());
    prize.benched = pool.slice(8);
    prize.cols = [pool.slice(0, 8), [null, null, null, null], [null, null], [null]];
    prize.pred = [null, [null, null, null, null], [null, null], [null]];
    prize.act = [null, [null, null, null, null], [null, null], [null]];
    prize.bustAt = null; prize.match = null;
  }
  function startPrize() { drawSeed(); renderPrizeSeed(); }
  function roundLabel(level) { return level === 1 ? "8강" : level === 2 ? "4강" : "결승"; }

  function renderPrizeSeed() {
    destroyGacha(); mood("idle");
    show(
      '<div class="clay">' +
        '<button class="back" id="back">← 닫기</button>' +
        '<div style="text-align:center;margin-bottom:6px"><span class="benched">제외 ' + prize.benched.map(function (t) { return '<span class="bt">' + t.name + '</span>'; }).join("") + '</span></div>' +
        '<div class="sim-stage"><div class="bracket-wrap pb" id="prizeBracket"></div></div>' +
        '<div class="controls">' +
          '<button class="btn ghost" id="redraw">🎲 다시 추첨</button>' +
          '<button class="btn big" id="toPredict">예측 입력 →</button>' +
        '</div>' +
      '</div>'
    );
    document.getElementById("prizeBracket").innerHTML = renderPrizeBracketSVG("seed");
    document.getElementById("back").onclick = function () { SFX.click(); exitMode(); };
    document.getElementById("redraw").onclick = function () { SFX.click(); drawSeed(); renderPrizeSeed(); };
    document.getElementById("toPredict").onclick = function () { SFX.click(); renderPrizePredict(); };
  }

  function readPredSelects() {
    [].slice.call(document.querySelectorAll("#predForm select")).forEach(function (sel) {
      var lvl = +sel.getAttribute("data-lvl"), idx = +sel.getAttribute("data-idx");
      prize.pred[lvl][idx] = sel.value ? teamByName[sel.value] : null;
    });
    for (var j = 0; j < 2; j++) { var f = [prize.pred[1][2 * j], prize.pred[1][2 * j + 1]]; if (prize.pred[2][j] && f.indexOf(prize.pred[2][j]) < 0) prize.pred[2][j] = null; }
    var cf = [prize.pred[2][0], prize.pred[2][1]]; if (prize.pred[3][0] && cf.indexOf(prize.pred[3][0]) < 0) prize.pred[3][0] = null;
  }
  function predComplete() { return prize.pred[1].every(Boolean) && prize.pred[2].every(Boolean) && !!prize.pred[3][0]; }
  function selHtml(lvl, idx, opts) {
    var cur = prize.pred[lvl][idx];
    var disabled = opts.some(function (o) { return !o; }) ? " disabled" : "";
    var h = '<select data-lvl="' + lvl + '" data-idx="' + idx + '"' + disabled + '><option value="">선택</option>';
    opts.forEach(function (o) { if (o) h += '<option value="' + o.name + '"' + (cur === o ? " selected" : "") + '>' + o.name + '</option>'; });
    return h + '</select>';
  }
  function renderPrizePredict() {
    destroyGacha(); mood("idle");
    var c0 = prize.cols[0], sf = "", fn = "", k;
    for (k = 0; k < 4; k++) sf += '<label><span>' + c0[2 * k].name + ' vs ' + c0[2 * k + 1].name + '</span>' + selHtml(1, k, [c0[2 * k], c0[2 * k + 1]]) + '</label>';
    for (k = 0; k < 2; k++) fn += '<label><span>4강 ' + (k + 1) + '</span>' + selHtml(2, k, [prize.pred[1][2 * k], prize.pred[1][2 * k + 1]]) + '</label>';
    var ch = '<label><span>우승</span>' + selHtml(3, 0, [prize.pred[2][0], prize.pred[2][1]]) + '</label>';
    show(
      '<div class="clay">' +
        '<button class="back" id="back">← 대진 추첨</button>' +
        '<div class="sim-stage">' +
          '<div class="bracket-wrap pb" id="prizeBracket"></div>' +
          '<div class="ov" id="predForm">' +
            '<div class="ov-card">' +
              '<div class="pred-row">' +
                '<div class="pred-group"><h4>4강 진출</h4>' + sf + '</div>' +
                '<div class="pred-group"><h4>결승 진출</h4>' + fn + '</div>' +
                '<div class="pred-group"><h4>우승</h4>' + ch + '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="controls"><button class="btn big" id="lock">예측 잠금 & 시작 🎰</button></div>' +
      '</div>'
    );
    document.getElementById("prizeBracket").innerHTML = renderPrizeBracketSVG("predict");
    document.getElementById("back").onclick = function () { SFX.click(); renderPrizeSeed(); };
    [].slice.call(document.querySelectorAll("#predForm select")).forEach(function (sel) {
      sel.onchange = function () { SFX.click(); readPredSelects(); renderPrizePredict(); };
    });
    var lock = document.getElementById("lock");
    lock.disabled = !predComplete();
    lock.onclick = function () { SFX.click(); startPrizeSim(); };
  }

  function redrawPrize() {
    var b = document.getElementById("prizeBracket");
    if (b) b.innerHTML = renderPrizeBracketSVG("sim");
  }
  function startPrizeSim() {
    prize.act = [null, [null, null, null, null], [null, null], [null]];
    prize.bustAt = null; prize.match = null;
    mood("cheer");
    show(
      '<div class="clay">' +
        '<button class="back" id="back">← 닫기</button>' +
        '<div class="sim-stage">' +
          '<div class="bracket-wrap pb" id="prizeBracket"></div>' +
          '<div class="showdown" id="showdown"></div>' +
        '</div>' +
      '</div>'
    );
    redrawPrize();
    document.getElementById("back").onclick = function () { SFX.click(); destroyGacha(); exitMode(); };
    destroyGacha();
    setTimeout(function () { simRo8(0); }, 500);
  }

  function renderBar(side) {
    var g = prize.match.games, h = "";
    for (var i = 0; i < 5; i++) {
      if (i < g.length) { var won = g[i] === side; h += '<span class="slot ' + (won ? "o" : "x") + '">' + (won ? "O" : "X") + "</span>"; }
      else h += '<span class="slot dash">–</span>';
    }
    return h;
  }
  function updateBars() {
    var ba = document.getElementById("barA"), bb = document.getElementById("barB");
    if (ba) ba.innerHTML = renderBar("a");
    if (bb) bb.innerHTML = renderBar("b");
  }
  function showShowdown(a, b, level) {
    prize.match = { a: a, b: b, sa: 0, sb: 0, games: [] };
    var sd = document.getElementById("showdown");
    sd.innerHTML =
      '<div class="vs-header">' +
        '<div class="fighter left" style="--c:' + a.color + '"><span class="fname">' + a.name + '</span></div>' +
        '<div class="vs-mid">VS<br><small>' + roundLabel(level) + '</small></div>' +
        '<div class="fighter right" style="--c:' + b.color + '"><span class="fname">' + b.name + '</span></div>' +
      '</div>' +
      '<div class="score-row"><div class="sbar" id="barA"></div><div class="sbar rev" id="barB"></div></div>' +
      '<div class="gacha-stage" id="gachaStage"></div>';
    sd.classList.add("show");
    updateBars();
    destroyGacha();
    prize.gacha = createGacha(document.getElementById("gachaStage"));
  }
  function hideShowdown() {
    destroyGacha();
    var sd = document.getElementById("showdown");
    if (sd) { sd.classList.remove("show"); sd.innerHTML = ""; }
  }
  // play one Bo5 tie game-by-game; each capsule pull = one game, bars fill with O/X
  function playTie(a, b, predWinner, level, idx, next) {
    showShowdown(a, b, level);
    setTimeout(pullGame, 600);
    function pullGame() {
      var side = Math.random() < 0.5 ? "a" : "b";
      var gw = side === "a" ? a : b;
      prize.gacha.dispense({ label: gw.name, color: hexNum(gw.color) }, function () {
        prize.match.games.push(side);
        if (side === "a") prize.match.sa++; else prize.match.sb++;
        updateBars();
        if (prize.match.sa === 3 || prize.match.sb === 3) {
          var winner = prize.match.sa === 3 ? a : b;
          prize.act[level][idx] = winner;
          setTimeout(function () {
            hideShowdown();
            redrawPrize();
            if (winner !== predWinner) { return prizeBust(level, idx); }
            setTimeout(next, 800);
          }, 1300);
        } else {
          setTimeout(pullGame, 450);
        }
      }, { fast: true, mystery: true });
    }
  }
  function simRo8(i) {
    if (i > 3) { return simSemi(0); }
    playTie(prize.cols[0][2 * i], prize.cols[0][2 * i + 1], prize.pred[1][i], 1, i, function () { simRo8(i + 1); });
  }
  function simSemi(j) {
    if (j > 1) { return simFinal(); }
    playTie(prize.act[1][2 * j], prize.act[1][2 * j + 1], prize.pred[2][j], 2, j, function () { simSemi(j + 1); });
  }
  function simFinal() {
    playTie(prize.act[2][0], prize.act[2][1], prize.pred[3][0], 3, 0, function () { prizeResult(true); });
  }
  function prizeBust(level, idx) { prize.bustAt = { level: level, idx: idx }; redrawPrize(); setTimeout(function () { prizeResult(false); }, 1500); }
  function correctCount() {
    if (!prize.bustAt) return 7;
    var b = prize.bustAt;
    if (b.level === 1) return b.idx;
    if (b.level === 2) return 4 + b.idx;
    return 6;
  }
  function prizeResult(perfect) {
    destroyGacha();
    var n = correctCount();
    mood(perfect ? "celebrate" : "sad");
    var body = perfect
      ? '<div class="crown">🏆</div><div class="who">7 / 7 퍼펙트!</div><div class="sub">시청자 상품 획득! 🎉</div>'
      : '<div class="crown">💥</div><div class="who" style="color:var(--bust)">실패</div><div class="sub">' + roundLabel(prize.bustAt.level) + '에서 예측이 빗나갔어요 · 정답 ' + n + ' / 7</div>';
    show(
      '<div class="clay">' +
        '<div class="sim-stage">' +
          '<div class="bracket-wrap pb" id="prizeBracket"></div>' +
          '<div class="ov">' +
            '<div class="ov-card" style="text-align:center">' +
              '<div class="champ" style="padding:4px 0">' + body + '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="controls">' +
          '<button class="btn ghost" id="retry">다시 도전</button>' +
          '<button class="btn" id="closeP">닫기</button>' +
        '</div>' +
      '</div>'
    );
    document.getElementById("prizeBracket").innerHTML = renderPrizeBracketSVG("sim");
    if (perfect) confetti();
    document.getElementById("retry").onclick = function () { SFX.click(); startPrize(); };
    document.getElementById("closeP").onclick = function () { SFX.click(); exitMode(); };
  }

  function renderPrizeBracketSVG(phase) {
    var cols = prize.cols, R = 3;
    var boxW = 132, boxH = 34, vGap = 16, colGap = 52, colStep = boxW + colGap;
    var centers = [];
    centers[0] = cols[0].map(function (_, i) { return i * (boxH + vGap) + boxH / 2; });
    for (var c = 1; c <= R; c++) { centers[c] = []; for (var j = 0; j < cols[c].length; j++) centers[c][j] = (centers[c - 1][2 * j] + centers[c - 1][2 * j + 1]) / 2; }
    var totalH = cols[0].length * (boxH + vGap) - vGap, totalW = R * colStep + boxW, p = [];
    p.push('<g fill="none" stroke="#e3c9da" stroke-width="2">');
    for (var c2 = 1; c2 <= R; c2++) {
      var xcr = (c2 - 1) * colStep + boxW, xpl = c2 * colStep, midX = (xcr + xpl) / 2;
      for (var j2 = 0; j2 < cols[c2].length; j2++) {
        var yT = centers[c2 - 1][2 * j2], yB = centers[c2 - 1][2 * j2 + 1], yP = centers[c2][j2];
        p.push('<path d="M' + xcr + ' ' + yT + ' H' + midX + ' V' + yB + ' M' + xcr + ' ' + yB + ' H' + midX + ' M' + midX + ' ' + yP + ' H' + xpl + '"/>');
      }
    }
    p.push('</g>');
    for (var c3 = 0; c3 <= R; c3++) {
      for (var i = 0; i < cols[c3].length; i++) {
        var x = c3 * colStep, y = centers[c3][i] - boxH / 2;
        var team = null, fill = "#ffffff", stroke = "#f0d9e6", dash = "", txt = "#6b4a5a", crown = false;
        if (c3 === 0) { team = cols[0][i]; }
        else {
          var pred = prize.pred[c3] ? prize.pred[c3][i] : null;
          var act = (phase === "sim" && prize.act[c3]) ? prize.act[c3][i] : null;
          if (act) { team = act; if (act === pred) { fill = "#e7f8f0"; stroke = "#74cdab"; txt = "#1f7d5b"; if (c3 === R) crown = true; } else { fill = "#fdecef"; stroke = "#e98b9a"; txt = "#b23a4a"; } }
          else if (pred && phase !== "seed") { team = pred; fill = "#efe7fb"; stroke = "#bca7e8"; txt = "#5a4a8c"; }
          else { stroke = "#e6d2e0"; dash = ' stroke-dasharray="4 4"'; txt = "#bda7b6"; }
        }
        p.push('<g>');
        p.push('<rect x="' + x + '" y="' + y + '" width="' + boxW + '" height="' + boxH + '" rx="9" fill="' + fill + '" stroke="' + stroke + '" stroke-width="1.6"' + dash + '/>');
        if (team) {
          p.push('<circle cx="' + (x + 16) + '" cy="' + (y + boxH / 2) + '" r="7" fill="' + team.color + '"/>');
          p.push('<text x="' + (x + 30) + '" y="' + (y + boxH / 2 + 5) + '" font-size="13" font-weight="700" fill="' + txt + '">' + team.name + '</text>');
        } else {
          p.push('<text x="' + (x + boxW / 2) + '" y="' + (y + boxH / 2 + 5) + '" font-size="15" fill="' + txt + '" text-anchor="middle">?</text>');
        }
        if (crown) p.push('<text x="' + (x + boxW - 6) + '" y="' + (y + boxH / 2 + 6) + '" font-size="17" text-anchor="end">👑</text>');
        p.push('</g>');
      }
    }
    return '<svg viewBox="0 0 ' + totalW + ' ' + totalH + '" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block;overflow:visible">' + p.join("") + '</svg>';
  }

  function confetti() {
    var cols = PASTELS.concat(["#e98bb3", "#8f78d6"]);
    for (var i = 0; i < 80; i++) {
      (function () {
        var el = document.createElement("div");
        el.className = "confetti";
        el.style.left = Math.random() * 100 + "vw";
        el.style.background = cols[Math.floor(Math.random() * cols.length)];
        el.style.transform = "rotate(" + Math.random() * 360 + "deg)";
        document.body.appendChild(el);
        var fall = 1600 + Math.random() * 1400;
        el.animate(
          [{ top: "-12px", opacity: 1 }, { top: "100vh", opacity: .9 }],
          { duration: fall, easing: "cubic-bezier(.3,.6,.6,1)" }
        ).onfinish = function () { el.remove(); };
      })();
    }
  }

  /* boot */
  if (MODE === "mukbang") { document.body.classList.add("gameview"); renderMukSetup(); }
  else if (MODE === "prize") { document.body.classList.add("gameview"); startPrize(); }
  else { renderHome(); }

  // expose core for quick console testing
  window.__bracket = { parseFoods: parseFoods, nextPow2: nextPow2 };
})();
</script>
