<!DOCTYPE html>
<!--
  ============================================================
  먹방 보드 (Mukbang Board) — mukbang-board.html
  Non-git version log (newest first).
  Bump APP_VERSION + add an entry to VERSIONS[] (in <script>)
  whenever you change this file. The badge + changelog panel
  in the app render straight from that array.
  ============================================================
  v1.6.0 — 2026-07-08
    - Note moved to its own container above the tracker (shorter height)
  v1.5.0 — 2026-07-08
    - Click-to-edit is now a NOTE, fully separate from the tracker
    - Note persists on its own; buttons/count are unaffected by it
  v1.4.0 — 2026-07-08
    - (superseded) Click-to-edit that set the count directly
    - In-file version control: version badge + changelog panel
  v1.3.0 — 2026-07-08
    - Raised page/display contrast; AA contrast pass on all UI text
  v1.2.0 — 2026-07-08
    - Compact layout; fixed label/number spacing; reduced glow
  v1.1.0 — 2026-07-08
    - Slim calculator-style display; fixed click handling
  v1.0.0 — 2026-07-08
    - Initial 먹어/먹지마 tracker (140 / 150 / 1414 / 1415)
  ============================================================
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>먹어 / 먹지마 트래커</title>
<style>
  :root {
    --eat: #38c6ff;       /* 먹어 sky blue */
    --eat-glow: #7fe0ff;
    --no: #ff3b4e;        /* 먹지마 red */
    --no-glow: #ff7a86;
    --neutral: #9aa7b4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }

  body {
    font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #3a4a63, #1c2637 70%);
    color: #fff;
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ===== calculator-style display ===== */
  .display {
    position: relative;
    width: 100%;
    height: 96px;
    border-radius: 14px;
    background: linear-gradient(160deg, #070b14, #03060c);
    border: 1px solid rgba(255,255,255,0.16);
    box-shadow: 0 14px 40px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.08);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 28px;
    overflow: hidden;
    transition: box-shadow .35s ease;
  }
  .display::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,.05) 50%, transparent);
    transform: translateX(-100%);
    pointer-events: none;
  }
  .display.flash::after { animation: sheen .55s ease; }
  @keyframes sheen { to { transform: translateX(100%); } }

  /* ---- editable note: its own container, shorter than the display ---- */
  .note-box {
    position: relative;
    width: 100%;
    height: 78px;
    border-radius: 12px;
    background: linear-gradient(160deg, #0a1220, #05090f);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 8px 22px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    overflow: hidden;
    cursor: text;
  }
  .note {
    font-size: clamp(23px, 5.25vw, 30px);
    font-weight: 700;
    letter-spacing: .3px;
    color: rgba(255,255,255,.92);
    cursor: text;
    padding: 2px 10px;
    border-radius: 6px;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background .15s;
  }
  .note:hover { background: rgba(255,255,255,.06); }
  .note.empty { color: rgba(255,255,255,.38); font-weight: 600; }
  .note-input {
    position: absolute;
    inset: 0;
    display: none;
    width: 100%;
    border: none;
    background: transparent;
    text-align: center;
    color: #fff;
    font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
    font-size: clamp(23px, 5.25vw, 30px);
    font-weight: 700;
    letter-spacing: .3px;
    outline: none;
    caret-color: var(--eat-glow);
  }
  .note-box.editing .note { visibility: hidden; }
  .note-box.editing .note-input { display: block; }

  /* ---- tracker readout ---- */
  .view {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .label {
    font-size: clamp(26px, 6vw, 40px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 1px;
    white-space: nowrap;
    transition: color .3s, text-shadow .3s;
  }
  .count {
    font-family: "Consolas", "SF Mono", monospace;
    font-size: clamp(40px, 9vw, 62px);
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: color .3s, text-shadow .3s;
  }
  .count.bump { animation: bump .25s ease; }
  @keyframes bump { 0%{transform:scale(1);} 40%{transform:scale(1.14);} 100%{transform:scale(1);} }

  .display.eat .label { color: var(--eat); text-shadow: 0 0 6px rgba(56,198,255,.45); }
  .display.eat .count { color: var(--eat); text-shadow: 0 0 8px rgba(127,224,255,.4); }
  .display.eat { box-shadow: 0 0 0 1px rgba(56,198,255,.3), 0 0 50px rgba(56,198,255,.22), inset 0 0 36px rgba(56,198,255,.06); }

  .display.no .label { color: var(--no); text-shadow: 0 0 6px rgba(255,59,78,.45); }
  .display.no .count { color: var(--no); text-shadow: 0 0 8px rgba(255,122,134,.4); }
  .display.no { box-shadow: 0 0 0 1px rgba(255,59,78,.3), 0 0 50px rgba(255,59,78,.22), inset 0 0 36px rgba(255,59,78,.06); }

  .display.zero .label { color: var(--neutral); }
  .display.zero .count { color: var(--neutral); text-shadow: 0 0 6px rgba(154,167,180,.3); }

  /* ===== buttons ===== */
  .pad {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 10px;
  }
  .btn {
    position: relative;
    border: none;
    cursor: pointer;
    border-radius: 12px;
    padding: 11px 10px;
    font-weight: 900;
    color: #fff;
    background: #131c2c;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 8px 22px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
    transition: transform .08s ease, box-shadow .25s ease, filter .2s;
    overflow: hidden;
    user-select: none;
  }
  .btn .num { font-size: clamp(19px, 4.5vw, 24px); letter-spacing: 1px; }
  .btn small {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    opacity: .9;
    margin-top: 3px;
  }
  .btn:active { transform: translateY(3px) scale(.98); }

  .btn.eat { box-shadow: 0 8px 22px rgba(0,0,0,.4), 0 0 0 1px rgba(56,198,255,.25), 0 6px 26px rgba(56,198,255,.16); }
  .btn.eat:hover { filter: brightness(1.15); box-shadow: 0 8px 28px rgba(56,198,255,.4), 0 0 0 1px rgba(56,198,255,.5); }
  .btn.eat small { color: var(--eat-glow); }
  .btn.no { box-shadow: 0 8px 22px rgba(0,0,0,.4), 0 0 0 1px rgba(255,59,78,.25), 0 6px 26px rgba(255,59,78,.16); }
  .btn.no:hover { filter: brightness(1.15); box-shadow: 0 8px 28px rgba(255,59,78,.4), 0 0 0 1px rgba(255,59,78,.5); }
  .btn.no small { color: var(--no-glow); }

  .ripple {
    position: absolute; border-radius: 50%;
    transform: scale(0);
    background: rgba(255,255,255,.35);
    animation: ripple .5s linear;
    pointer-events: none;
  }
  @keyframes ripple { to { transform: scale(4); opacity: 0; } }

  .footer { display: flex; justify-content: center; }
  .reset {
    background: transparent;
    border: 1px solid rgba(255,255,255,.15);
    color: rgba(255,255,255,.6);
    border-radius: 10px;
    padding: 9px 22px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all .2s;
  }
  .reset:hover { color: #fff; border-color: rgba(255,255,255,.4); }

  /* ===== version control ===== */
  .ver {
    position: fixed;
    right: 14px; bottom: 12px;
    z-index: 6;
    color: rgba(255,255,255,.45);
    font-size: 12px; font-weight: 600; letter-spacing: 1px;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="note-box" id="noteRow">
      <div class="note empty" id="note" title="클릭해서 메모 입력">＋ 메모 추가</div>
      <input class="note-input" id="noteInput" type="text" autocomplete="off" spellcheck="false" maxlength="80" />
    </div>

    <div class="display zero" id="display">
      <div class="view" id="view">
        <div class="label" id="label">먹어 / 먹지마</div>
        <div class="count" id="count">0</div>
      </div>
    </div>
    <div class="pad">
      <button class="btn eat" data-delta="1"><span class="num">140</span><small>먹어 +1</small></button>
      <button class="btn no"  data-delta="-1"><span class="num">150</span><small>먹지마 +1</small></button>
      <button class="btn eat" data-delta="10"><span class="num">1414</span><small>먹어 +10</small></button>
      <button class="btn no"  data-delta="-10"><span class="num">1415</span><small>먹지마 +10</small></button>
    </div>

    <div class="footer">
      <button class="reset" id="reset">RESET</button>
    </div>
  </div>

  <span class="ver" id="ver">v0.0.0</span>

<script>
  /* ===================== version control ===================== */
  var VERSIONS = [
    { v: "1.6.0", d: "2026-07-08", notes: [
      "메모를 트래커 위 별도 컨테이너로 분리 (높이도 더 낮게)"
    ]},
    { v: "1.5.0", d: "2026-07-08", notes: [
      "클릭 편집을 '메모' 기능으로 변경 — 트래커와 완전히 분리",
      "메모는 별도로 저장되며 카운트/버튼에 영향을 주지 않음"
    ]},
    { v: "1.4.0", d: "2026-07-08", notes: [
      "(대체됨) 클릭 편집으로 카운트를 직접 수정",
      "파일 내 버전 관리: 버전 뱃지 + 변경 이력 패널"
    ]},
    { v: "1.3.0", d: "2026-07-08", notes: [
      "배경·디스플레이 대비 향상, 전체 텍스트 AA 대비 통과"
    ]},
    { v: "1.2.0", d: "2026-07-08", notes: [
      "레이아웃 컴팩트화, 라벨/숫자 간격 고정, 글로우 감소"
    ]},
    { v: "1.1.0", d: "2026-07-08", notes: [
      "계산기 스타일 슬림 디스플레이, 클릭 처리 수정"
    ]},
    { v: "1.0.0", d: "2026-07-08", notes: [
      "먹어/먹지마 트래커 최초 버전 (140 / 150 / 1414 / 1415)"
    ]}
  ];
  var APP_VERSION = VERSIONS[0].v;
  document.getElementById("ver").textContent = "v" + APP_VERSION;

  /* ===================== tracker (independent) ===================== */
  (function () {
    var KEY = "eat-tracker-net";
    var net = parseInt(localStorage.getItem(KEY) || "0", 10);
    if (isNaN(net)) net = 0;

    var display = document.getElementById("display");
    var labelEl = document.getElementById("label");
    var countEl = document.getElementById("count");

    // display.className is fully reset here; note lives in child .note-row, so it is untouched.
    function render(animate) {
      if (net > 0) {
        display.className = "display eat";
        labelEl.textContent = "먹어";
        countEl.textContent = net;
      } else if (net < 0) {
        display.className = "display no";
        labelEl.textContent = "먹지마";
        countEl.textContent = Math.abs(net);
      } else {
        display.className = "display zero";
        labelEl.textContent = "먹어 / 먹지마";
        countEl.textContent = "0";
      }
      try { localStorage.setItem(KEY, String(net)); } catch (e) {}

      if (animate) {
        countEl.classList.remove("bump");
        void countEl.offsetWidth;
        countEl.classList.add("bump");
        display.classList.add("flash");
        setTimeout(function () { display.classList.remove("flash"); }, 560);
      }
    }

    function ripple(btn, e) {
      var r = document.createElement("span");
      r.className = "ripple";
      var rect = btn.getBoundingClientRect();
      var size = Math.max(rect.width, rect.height);
      r.style.width = r.style.height = size + "px";
      r.style.left = (e.clientX - rect.left - size / 2) + "px";
      r.style.top = (e.clientY - rect.top - size / 2) + "px";
      btn.appendChild(r);
      setTimeout(function () { r.remove(); }, 500);
    }

    var buttons = document.querySelectorAll(".btn[data-delta]");
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].addEventListener("click", function (e) {
        net += parseInt(this.getAttribute("data-delta"), 10);  // opposites cancel
        ripple(this, e);
        render(true);
      });
    }

    document.getElementById("reset").addEventListener("click", function () {
      net = 0;
      render(true);
    });

    render(false);
  })();

  /* ===================== note (independent) ===================== */
  (function () {
    var NOTE_KEY = "eat-tracker-note";
    var PLACEHOLDER = "";

    var noteRow   = document.getElementById("noteRow");
    var noteEl    = document.getElementById("note");
    var noteInput = document.getElementById("noteInput");

    var note = "";
    try { note = localStorage.getItem(NOTE_KEY) || ""; } catch (e) {}

    var editing = false, cancel = false;

    function renderNote() {
      if (note.trim() === "") {
        noteEl.textContent = PLACEHOLDER;
        noteEl.classList.add("empty");
      } else {
        noteEl.textContent = note;
        noteEl.classList.remove("empty");
      }
    }

    function startEdit() {
      if (editing) return;
      editing = true; cancel = false;
      noteInput.value = note;
      noteRow.classList.add("editing");
      noteInput.focus();
      noteInput.select();
    }

    function commitEdit() {
      if (!editing) return;
      editing = false;
      noteRow.classList.remove("editing");
      if (!cancel) {
        note = noteInput.value;
        try { localStorage.setItem(NOTE_KEY, note); } catch (e) {}
      }
      cancel = false;
      renderNote();
    }

    noteRow.addEventListener("click", startEdit);
    noteInput.addEventListener("blur", commitEdit);
    noteInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); noteInput.blur(); }
      else if (e.key === "Escape") { e.preventDefault(); cancel = true; noteInput.blur(); }
    });

    renderNote();
  })();
</script>
</body>
</html>
