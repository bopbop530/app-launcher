<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBO 가을야구 브래킷 예측</title>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Gothic+A1:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05070d;
  --panel:rgba(16,22,36,.82);
  --panel-line:rgba(255,255,255,.08);
  --gold:#ffd76a;
  --gold-deep:#e0a13c;
  --red:#ff3b5c;
  --green:#3df58c;
  --text:#eef2fa;
  --dim:#8b96ad;
}
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{
  font-family:'Gothic A1','Noto Sans KR',sans-serif;color:var(--text);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.hype{font-family:'Do Hyeon','Noto Sans KR',sans-serif;font-weight:400;letter-spacing:.02em}

/* ── background ─────────────────────────── */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg::before{
  content:'';position:absolute;inset:-50%;
  background:
    radial-gradient(ellipse 60% 45% at 50% -5%, rgba(64,110,255,.16), transparent 60%),
    radial-gradient(ellipse 45% 40% at 12% 108%, rgba(255,90,60,.10), transparent 60%),
    radial-gradient(ellipse 45% 40% at 88% 108%, rgba(255,200,80,.08), transparent 60%);
}
.bg .grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(120,150,255,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(120,150,255,.05) 1px,transparent 1px);
  background-size:64px 64px;
  mask-image:radial-gradient(ellipse 75% 70% at 50% 45%,black 30%,transparent 75%);
}
.beam{position:absolute;top:-20%;width:220px;height:150%;
  background:linear-gradient(180deg,rgba(255,240,200,.07),transparent 70%);
  transform:skewX(-12deg);filter:blur(6px);animation:beamSway 9s ease-in-out infinite alternate}
.beam.b1{left:12%}.beam.b2{left:46%;animation-delay:-3s}.beam.b3{left:78%;animation-delay:-6s}
@keyframes beamSway{from{transform:skewX(-14deg) translateX(-40px)}to{transform:skewX(-6deg) translateX(40px)}}
#fx{position:fixed;inset:0;z-index:50;pointer-events:none}

/* ── HUD ─────────────────────────── */
#hud{
  position:fixed;top:18px;left:0;right:0;z-index:20;
  display:flex;justify-content:space-between;align-items:center;padding:0 34px;
}
#hud .logo{display:flex;align-items:baseline;gap:10px}
#hud .logo .k{font-size:26px;color:var(--gold)}
#hud .logo .s{font-size:14px;color:var(--dim);letter-spacing:.14em}
#hudbtns{display:flex;gap:8px}
.hud-btn{
  background:var(--panel);border:1px solid var(--panel-line);border-radius:10px;
  width:38px;height:34px;color:var(--dim);cursor:pointer;font-size:15px;
}
.hud-btn:hover{color:var(--text);border-color:rgba(255,255,255,.25)}

/* ── scenes ─────────────────────────── */
.scene{
  position:fixed;inset:0;z-index:5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .45s ease;
}
.scene.active{opacity:1;pointer-events:auto}

/* buttons */
.btn{
  font-family:inherit;font-weight:800;
  font-size:23px;letter-spacing:.01em;color:#1a1204;cursor:pointer;
  background:linear-gradient(180deg,#ffe9a8,var(--gold) 45%,var(--gold-deep));
  border:none;border-radius:14px;padding:16px 52px;
  box-shadow:0 0 24px rgba(255,215,106,.35),0 6px 0 #8a5f16;
  transition:transform .12s,box-shadow .12s,filter .2s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(255,215,106,.55),0 8px 0 #8a5f16}
.btn:active{transform:translateY(3px);box-shadow:0 0 20px rgba(255,215,106,.4),0 2px 0 #8a5f16}
.btn:disabled{filter:grayscale(.9) brightness(.55);cursor:not-allowed;box-shadow:none;transform:none}
.btn.ghost{
  background:rgba(255,255,255,.06);color:var(--text);
  box-shadow:none;border:1px solid var(--panel-line);font-size:20px;padding:13px 34px;
}
.btn.ghost:hover{background:rgba(255,255,255,.12)}
.btn.pulse{animation:btnPulse 1.1s ease-in-out infinite}
@keyframes btnPulse{50%{box-shadow:0 0 52px rgba(255,215,106,.85),0 6px 0 #8a5f16}}

/* ── title scene ─────────────────────────── */
#scene-title .emblem{font-size:110px;line-height:1;margin-bottom:20px;filter:drop-shadow(0 0 30px rgba(255,215,106,.4));animation:float 3.4s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-12px)}}
#scene-title h1{font-size:88px;line-height:1.05;text-align:center;
  background:linear-gradient(180deg,#fff 20%,var(--gold) 65%,var(--gold-deep));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 4px 24px rgba(255,190,60,.25));
}
#scene-title .sub{margin:16px 0 48px;font-size:21px;color:var(--dim);letter-spacing:.28em}
#logo-marquee{
  position:absolute;top:145px;left:0;right:0;overflow:hidden;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 15%,#000 85%,transparent);
  mask-image:linear-gradient(90deg,transparent,#000 15%,#000 85%,transparent);
}
#mq-track{display:flex;width:max-content;will-change:transform}
.mq-group{display:flex;gap:42px;padding-right:42px}
#logo-marquee .badge{width:72px;height:72px;font-size:19px;flex:none}

/* ── seeding scene ─────────────────────────── */
.scene-h{font-size:44px;margin-bottom:8px}
.scene-sub{color:var(--dim);font-size:17px;margin-bottom:42px;letter-spacing:.1em}
#seed-row{display:flex;gap:22px;margin-bottom:52px}
.seed-slot{display:flex;flex-direction:column;align-items:center;gap:14px}
.seed-num{
  font-weight:800;font-size:16px;color:var(--dim);
  background:rgba(255,255,255,.05);border:1px solid var(--panel-line);
  border-radius:99px;padding:5px 18px;
}
.seed-num.hot{color:var(--gold);border-color:rgba(255,215,106,.5)}
.seed-card{
  width:206px;height:250px;border-radius:18px;position:relative;overflow:hidden;
  background:var(--panel);border:1px solid var(--panel-line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:transform .25s,box-shadow .25s,border-color .25s;
}
.seed-card .q{font-size:64px;color:rgba(255,255,255,.14);font-family:'Do Hyeon'}
.seed-card.spin{border-color:rgba(255,215,106,.35)}
.seed-card.landed{
  border-color:var(--tc1,#fff);
  box-shadow:0 0 34px color-mix(in srgb,var(--tc1) 45%,transparent);
  animation:stamp .38s cubic-bezier(.2,2.2,.4,1)
}
@keyframes stamp{0%{transform:scale(1.28)}100%{transform:scale(1)}}
.badge{
  width:96px;height:96px;border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:26px;color:#fff;
  background:radial-gradient(circle at 32% 28%,color-mix(in srgb,var(--tc1) 100%,#fff 18%),var(--tc1) 55%,var(--tc2));
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.22),0 6px 18px rgba(0,0,0,.5);
  text-shadow:0 2px 6px rgba(0,0,0,.45);
}
.badge.sm{width:46px;height:46px;font-size:14px;flex:none}
/* real logo (logos/<id>.png) upgrades the badge; missing file falls back to initials */
.badge img{display:none}
.badge.has-logo{
  background:radial-gradient(circle at 32% 28%,#ffffff,#eef0f4 62%,#cfd3dc);
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.65),0 6px 18px rgba(0,0,0,.5);
}
.badge.has-logo span{display:none}
.badge.has-logo img{display:block;width:74%;height:74%;object-fit:contain;filter:drop-shadow(0 2px 5px rgba(0,0,0,.3))}
.seed-card .nm{font-size:21px;font-weight:900}
.seed-card .cycle{font-size:23px;font-weight:900;color:var(--gold)}

/* ── bracket / prediction scene ─────────────────────────── */
#ladder-wrap{display:flex;align-items:flex-end;gap:0;margin-bottom:40px}
.matchup{
  width:284px;background:var(--panel);border:1px solid var(--panel-line);
  border-radius:16px;padding:14px;position:relative;
  transition:border-color .25s,box-shadow .25s,opacity .25s;
}
.matchup.locked-off{opacity:.45;pointer-events:none}
.mu-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px;padding:0 3px}
.mu-tag{font-weight:800;font-size:15px;color:var(--gold)}
.mu-fmt{font-size:12px;color:var(--dim)}
.slot{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.045);border:1px solid transparent;border-radius:12px;
  padding:9px 11px;margin-top:8px;position:relative;height:66px;
  transition:background .15s,border-color .15s,transform .12s;
}
.slot.pickable{cursor:pointer}
.slot.pickable:hover{background:rgba(255,215,106,.10);border-color:rgba(255,215,106,.45);transform:translateX(3px)}
.slot .nm{font-size:17px;font-weight:900;line-height:1.2}
.slot .seedtag{font-size:11px;color:var(--dim);display:block;font-weight:500;margin-top:1px}
.slot.empty{justify-content:center;color:rgba(255,255,255,.22);font-size:14px;font-weight:700;letter-spacing:.08em;border-style:dashed;border-color:rgba(255,255,255,.1)}
.slot.picked{
  background:linear-gradient(90deg,rgba(255,215,106,.16),rgba(255,215,106,.05));
  border-color:var(--gold);
}
.slot.picked::after{
  content:'PICK';position:absolute;right:9px;top:50%;transform:translateY(-50%);
  font-weight:900;font-size:11px;color:#1a1204;background:var(--gold);
  border-radius:6px;padding:2px 8px;letter-spacing:.06em;
}
.chev{
  align-self:center;margin:0 8px 90px;font-size:26px;color:rgba(255,215,106,.5);
  animation:chevGlow 1.6s ease-in-out infinite;
}
@keyframes chevGlow{50%{color:var(--gold);transform:translateX(4px)}}
#champ-slot{
  width:250px;align-self:flex-start;margin-left:10px;
  background:linear-gradient(180deg,rgba(255,215,106,.10),rgba(255,215,106,.02));
  border:1px solid rgba(255,215,106,.35);border-radius:18px;
  padding:18px;display:flex;flex-direction:column;align-items:center;gap:10px;
}
#champ-slot .crown{font-size:40px;filter:drop-shadow(0 0 14px rgba(255,215,106,.6))}
#champ-slot .lbl{font-weight:900;font-size:14px;color:var(--gold);letter-spacing:.12em}
#champ-slot .who{font-size:21px;font-weight:900;min-height:30px;color:rgba(255,255,255,.3)}
#champ-slot .who.set{color:#fff;text-shadow:0 0 18px rgba(255,215,106,.5)}
/* rising steps */
.step0{margin-bottom:0}.step1{margin-bottom:44px}.step2{margin-bottom:88px}.step3{margin-bottom:132px}
.chev.c0{margin-bottom:60px}.chev.c1{margin-bottom:104px}.chev.c2{margin-bottom:148px}
#champ-slot{margin-bottom:180px}

/* ── series (sim) scene ─────────────────────────── */
#round-banner{text-align:center;margin-bottom:26px}
#round-tag{
  display:inline-block;font-weight:900;font-size:13px;color:#1a1204;
  background:var(--gold);border-radius:8px;padding:3px 14px;letter-spacing:.1em;margin-bottom:10px;
}
#round-name{font-size:46px;line-height:1.1}
#round-fmt{color:var(--dim);font-size:17px;margin-top:6px;letter-spacing:.14em}
#arena{display:flex;align-items:center;gap:40px;margin-bottom:26px}
.fighter{
  width:330px;border-radius:22px;padding:26px 20px 20px;position:relative;
  background:var(--panel);border:1px solid var(--panel-line);
  display:flex;flex-direction:column;align-items:center;gap:14px;
  transition:transform .3s,box-shadow .25s,border-color .2s,opacity .4s,filter .4s;
}
.fighter .badge{width:120px;height:120px;font-size:38px}
.fighter .nm{font-size:26px;font-weight:900}
.fighter .seedtag{font-size:13px;color:var(--dim);margin-top:-8px}
.fighter .pickmark{
  position:absolute;top:-13px;left:50%;transform:translateX(-50%);
  font-weight:900;font-size:12px;letter-spacing:.06em;
  background:var(--gold);color:#1a1204;border-radius:8px;padding:3px 13px;
  box-shadow:0 0 16px rgba(255,215,106,.55);
}
.fighter.rolling{transition:none}
.fighter.gwin{animation:gwinFlash .5s ease}
@keyframes gwinFlash{0%{box-shadow:0 0 80px color-mix(in srgb,var(--tc1) 95%,transparent);transform:scale(1.09)}}
.fighter.swin{
  border-color:var(--gold);transform:scale(1.07);
  box-shadow:0 0 70px rgba(255,215,106,.5),0 0 40px color-mix(in srgb,var(--tc1) 60%,transparent);
}
.fighter.slose{opacity:.28;filter:grayscale(.85);transform:scale(.94)}
.pips{display:flex;gap:8px}
.pip{
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  transition:all .25s;
}
.pip.won{background:var(--tc1);border-color:#fff;box-shadow:0 0 12px var(--tc1);animation:pipPop .35s cubic-bezier(.2,2,.4,1)}
@keyframes pipPop{0%{transform:scale(1.9)}100%{transform:scale(1)}}
#center-col{display:flex;flex-direction:column;align-items:center;gap:12px;width:200px}
#vs-mark{font-family:'Do Hyeon';font-size:64px;color:rgba(255,255,255,.85);text-shadow:0 0 30px rgba(120,150,255,.5)}
#momentum{
  position:relative;width:216px;height:16px;border-radius:99px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
}
#mo-track{
  position:absolute;inset:2px;border-radius:99px;opacity:.75;
  background:linear-gradient(90deg,var(--ca,#666) 0%,transparent 42%,transparent 58%,var(--cb,#666) 100%);
}
#mo-orb{
  position:absolute;top:50%;left:50%;width:24px;height:24px;border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle at 35% 30%,#fff,var(--gold) 55%,#a06f18);
  box-shadow:0 0 16px rgba(255,215,106,.85);
}
#game-label{
  font-family:'Do Hyeon';font-size:24px;color:var(--gold);letter-spacing:.12em;
  min-height:32px;opacity:0;transition:opacity .2s;
}
#game-label.on{opacity:1}
#mp-banner{
  font-weight:900;font-size:15px;color:var(--red);letter-spacing:.14em;
  min-height:24px;opacity:0;
}
#mp-banner.on{opacity:1;animation:mpBlink .55s steps(2) infinite}
@keyframes mpBlink{50%{opacity:.25}}
#series-log{display:flex;gap:7px;min-height:20px;margin-bottom:24px}
.logbox{
  width:34px;height:20px;border-radius:5px;background:var(--lc,#333);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);
  animation:pipPop .3s ease;
}
#progress{display:flex;gap:12px;margin-top:6px}
.pchip{
  display:flex;align-items:center;gap:8px;font-size:13px;
  background:var(--panel);border:1px solid var(--panel-line);border-radius:10px;
  padding:7px 13px;color:var(--dim);
}
.pchip b{color:var(--text)}
.pchip.current{border-color:var(--gold);color:var(--gold);box-shadow:0 0 14px rgba(255,215,106,.25)}
.pchip.hit{border-color:rgba(61,245,140,.55)}
.pchip.hit b{color:var(--green)}
.pchip.miss{border-color:rgba(255,59,92,.55)}
.pchip.miss b{color:var(--red);text-decoration:line-through}
/* ── stage stinger (transition) ─────────────────────────── */
#stinger{
  position:fixed;inset:0;z-index:60;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(3,5,10,.62);opacity:0;transition:opacity .22s;
}
#stinger.on{opacity:1}
#stinger .band{
  position:absolute;left:-8%;right:-8%;height:210px;top:50%;
  transform:translateY(-50%) skewY(-2.5deg) scaleX(0);
  background:linear-gradient(90deg,transparent,rgba(12,17,30,.97) 12%,rgba(12,17,30,.97) 88%,transparent);
  border-top:1px solid rgba(255,215,106,.4);border-bottom:1px solid rgba(255,215,106,.4);
}
#stinger.on .band{animation:bandIn var(--stdur,1.9s) ease both}
@keyframes bandIn{
  0%{transform:translateY(-50%) skewY(-2.5deg) scaleX(0)}
  16%,84%{transform:translateY(-50%) skewY(-2.5deg) scaleX(1)}
  100%{transform:translateY(-50%) skewY(-2.5deg) scaleX(0)}
}
#st-main{
  position:relative;font-size:94px;line-height:1;color:#fff;
  text-shadow:0 0 44px rgba(255,215,106,.45);opacity:0;
}
#st-sub{position:relative;font-size:19px;font-weight:700;color:var(--gold);letter-spacing:.16em;opacity:0}
#stinger.on #st-main{animation:stTxt var(--stdur,1.9s) cubic-bezier(.2,.9,.3,1) both}
#stinger.on #st-sub{animation:stTxt var(--stdur,1.9s) cubic-bezier(.2,.9,.3,1) both;animation-delay:.06s}
@keyframes stTxt{
  0%{opacity:0;transform:translateX(-150px)}
  18%,80%{opacity:1;transform:none}
  100%{opacity:0;transform:translateX(150px)}
}

/* ── verdict overlay ─────────────────────────── */
#verdict{
  position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#verdict.on{opacity:1;pointer-events:auto}
#verdict .big{font-size:120px;line-height:1}
#verdict .why{font-size:20px;color:var(--text);opacity:.85}
#verdict.hit{background:radial-gradient(ellipse at center,rgba(20,80,45,.88),rgba(4,10,7,.94))}
#verdict.hit .big{color:var(--green);text-shadow:0 0 60px rgba(61,245,140,.8);animation:stamp .4s cubic-bezier(.2,2.2,.4,1)}
#verdict.miss{background:radial-gradient(ellipse at center,rgba(90,12,25,.9),rgba(12,3,5,.95))}
#verdict.miss .big{color:var(--red);text-shadow:0 0 60px rgba(255,59,92,.8);animation:stamp .4s cubic-bezier(.2,2.2,.4,1)}
#verdict .vbtns{display:flex;gap:14px;margin-top:16px}
body.shake{animation:shake .5s}
@keyframes shake{
  10%,90%{transform:translate(-2px,1px)}20%,80%{transform:translate(4px,-2px)}
  30%,70%{transform:translate(-7px,3px)}40%,60%{transform:translate(7px,-3px)}50%{transform:translate(-5px,2px)}
}

/* ── final scene ─────────────────────────── */
#final-head{font-size:74px;line-height:1.1;margin-bottom:6px;text-align:center}
#final-head.perfect{
  background:linear-gradient(180deg,#fff,var(--gold) 60%,var(--gold-deep));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 34px rgba(255,205,80,.5));
}
#final-head.over{color:var(--red);text-shadow:0 0 40px rgba(255,59,92,.5)}
#final-sub{color:var(--dim);font-size:19px;margin-bottom:34px;letter-spacing:.08em}
#champ-card{
  display:flex;align-items:center;gap:20px;margin-bottom:34px;
  background:var(--panel);border:1px solid rgba(255,215,106,.4);border-radius:20px;
  padding:20px 36px;box-shadow:0 0 44px rgba(255,215,106,.18);
}
#champ-card .crown{font-size:52px}
#champ-card .who{font-size:34px;font-weight:900}
#champ-card .lab{font-weight:900;color:var(--gold);font-size:13px;letter-spacing:.14em}
#review{display:flex;flex-direction:column;gap:9px;margin-bottom:38px;min-width:560px}
.rev-row{
  display:grid;grid-template-columns:110px 1fr 40px 1fr;align-items:center;gap:12px;
  background:var(--panel);border:1px solid var(--panel-line);border-radius:12px;
  padding:10px 18px;font-size:16px;
}
.rev-row .r-tag{font-weight:800;color:var(--dim);font-size:13px}
.rev-row .r-pick,.rev-row .r-act{font-weight:900;display:flex;align-items:center;gap:8px}
.rev-row .r-mark{font-size:20px;text-align:center}
.rev-row.hit{border-color:rgba(61,245,140,.4)}
.rev-row.hit .r-mark{color:var(--green)}
.rev-row.miss{border-color:rgba(255,59,92,.4)}
.rev-row.miss .r-mark{color:var(--red)}
.rev-row.skip{opacity:.45}
.rev-row .dot{width:12px;height:12px;border-radius:50%;flex:none}
#final-btns{display:flex;gap:14px}
</style>
</head>
<body>
<div class="bg"><div class="grid"></div><div class="beam b1"></div><div class="beam b2"></div><div class="beam b3"></div></div>
<canvas id="fx"></canvas>

<div id="hud">
  <div class="logo"><span class="hype k">⚾ KBO 브래킷</span><span class="s">POSTSEASON PREDICTOR</span></div>
  <div id="hudbtns">
    <button class="hud-btn" id="btn-home" title="처음 화면으로 (리셋)">🏠</button>
    <button class="hud-btn" id="btn-mute" title="소리 켜기/끄기">🔊</button>
  </div>
</div>

<!-- TITLE -->
<section id="scene-title" class="scene active">
  <div class="emblem">🏆</div>
  <h1 class="hype">가을야구<br>브래킷 예측</h1>

<script>
/* ══════════════ data ══════════════ */
const TEAMS=[
  {id:'lg',    name:'LG 트윈스',    short:'LG',  c1:'#C30452', c2:'#2b0313'},
  {id:'hanwha',name:'한화 이글스',  short:'한화', c1:'#F3702E', c2:'#26130a'},
  {id:'ssg',   name:'SSG 랜더스',   short:'SSG', c1:'#CE0E2D', c2:'#231a10'},

];

  {key:'wc',  tag:'WC',  name:'와일드카드 결정전', fmt:'3전 2선승제', bestOf:3, prevLabel:'와일드카드 승자'},
  {key:'semi',tag:'준PO', name:'준플레이오프',     fmt:'5전 3선승제', bestOf:5, prevLabel:'준PO 승자'},

/* ══════════════ utils / state ══════════════ */
const $=s=>document.querySelector(s);
const PARAMS=new URLSearchParams(location.search);
const SPEED=PARAMS.has('fast')?(Number(PARAMS.get('fast'))||6):1;
const sleep=ms=>new Promise(r=>setTimeout(r,Math.max(16,ms/SPEED)));

let seeds=[];                 // [seed1..seed5]
let picks=[null,null,null,null];
let actual=[null,null,null,null];
let seedMap={};               // team.id -> seed number
let correct=0, runOver=false, watching=false;
let muted=false;
let epoch=0;   // bumped on reset/new run; async loops bail out when it changes

function incumbent(i){return seeds[3-i]}                       // WC→seed4, 준PO→seed3, PO→seed2, KS→seed1
function challengerPick(i){return i===0?seeds[4]:picks[i-1]}
function challengerActual(i){return i===0?seeds[4]:actual[i-1]}
function seedOf(t){return seedMap[t.id]}

function showScene(id){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}

/* ══════════════ audio ══════════════ */
let AC=null;
function ac(){if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC}
function blip(freq=700,dur=.05,type='square',vol=.05){
  if(muted)return;
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+dur);
    o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+dur);
  }catch(e){}
}
function chord(freqs,dur=.4,vol=.06){freqs.forEach((f,i)=>setTimeout(()=>blip(f,dur,'triangle',vol),i*60))}
function perfectFanfare(){                    // grand-prize win fanfare
  if(muted)return;
  try{
    const c=ac(),t0=c.currentTime+.03;
    const seq=[523.25,659.25,783.99,1046.5,1318.5,1567.98,2093];  // rising C-major run
    seq.forEach((f,i)=>{
      const t=t0+i*.09;
      const o=c.createOscillator(),g=c.createGain();
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(.13,t);
      g.gain.exponentialRampToValueAtTime(.0001,t+.28);
      o.connect(g).connect(c.destination);o.start(t);o.stop(t+.3);
    });
    const tC=t0+seq.length*.09+.04;           // sustained chord with vibrato shimmer
    [523.25,659.25,783.99,1046.5].forEach(f=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='triangle';o.frequency.value=f;
      const v=c.createOscillator(),vg=c.createGain();
      v.frequency.value=6;vg.gain.value=f*.006;
      v.connect(vg).connect(o.frequency);
      g.gain.setValueAtTime(.0001,tC);
      g.gain.exponentialRampToValueAtTime(.09,tC+.05);
      g.gain.setValueAtTime(.09,tC+.75);
      g.gain.exponentialRampToValueAtTime(.0001,tC+1.7);
      o.connect(g).connect(c.destination);
      o.start(tC);o.stop(tC+1.75);v.start(tC);v.stop(tC+1.75);
    });
    for(let i=0;i<6;i++){                     // sparkle dings on top
      const t=tC+.12+i*.13;
      const o=c.createOscillator(),g=c.createGain();
      o.type='sine';o.frequency.value=2093+(i%3)*349;
      g.gain.setValueAtTime(.05,t);
      g.gain.exponentialRampToValueAtTime(.0001,t+.3);
      o.connect(g).connect(c.destination);o.start(t);o.stop(t+.32);
    }
  }catch(e){}
}
function sadTrombone(){
  if(muted)return;
  try{
    const c=ac();
    const notes=[[233.08,.36],[220.00,.36],[207.65,.36],[196.00,1.25]];  // Bb3 A3 Ab3 G3~
    let t=c.currentTime+.05;
    notes.forEach(([f,d],i)=>{
      const o=c.createOscillator(),g=c.createGain(),lp=c.createBiquadFilter();
      o.type='sawtooth';lp.type='lowpass';lp.frequency.value=850;lp.Q.value=3;
      o.frequency.setValueAtTime(f*1.03,t);
      o.frequency.exponentialRampToValueAtTime(f,t+.07);          // slide into each note
      if(i===notes.length-1){
        o.frequency.setValueAtTime(f,t+.1);
        o.frequency.linearRampToValueAtTime(f*.90,t+d);           // final droop
        const v=c.createOscillator(),vg=c.createGain();           // wah vibrato
        v.frequency.value=5.2;vg.gain.value=7;
        v.connect(vg).connect(o.frequency);v.start(t+.15);v.stop(t+d);
      }
      g.gain.setValueAtTime(.0001,t);
      g.gain.exponentialRampToValueAtTime(.17,t+.05);
      g.gain.setValueAtTime(.17,t+Math.max(.06,d-.09));
      g.gain.exponentialRampToValueAtTime(.0001,t+d);
      o.connect(lp).connect(g).connect(c.destination);
      o.start(t);o.stop(t+d+.03);
      t+=d+.07;
    });
  }catch(e){}
}
function hitSound(){                      // short bright "ding-ding"
  if(muted)return;
  try{
    const c=ac();
    [[988,0,.16],[1319,.09,.34]].forEach(([f,dt,d])=>{
      const t=c.currentTime+.02+dt;
      const o=c.createOscillator(),g=c.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.15,t);
      g.gain.exponentialRampToValueAtTime(.0001,t+d);
      o.connect(g).connect(c.destination);o.start(t);o.stop(t+d+.02);
    });
  }catch(e){}
}
function whoosh(){
  if(muted)return;
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain(),lp=c.createBiquadFilter();
    o.type='sawtooth';lp.type='lowpass';lp.frequency.value=650;
    o.frequency.setValueAtTime(140,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(760,c.currentTime+.3);
    g.gain.setValueAtTime(.001,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.07,c.currentTime+.1);
    g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+.36);
    o.connect(lp).connect(g).connect(c.destination);
    o.start();o.stop(c.currentTime+.38);
  }catch(e){}
}
$('#btn-mute').onclick=()=>{muted=!muted;$('#btn-mute').textContent=muted?'🔇':'🔊'};
addEventListener('keydown',e=>{               // sound test hotkeys
  const k=e.key.toLowerCase();
  if(k==='p')perfectFanfare();                // perfect bracket win sound
  else if(k==='h')hitSound();                 // round hit ding
  else if(k==='f')sadTrombone();              // run-over trombone
});
function goHome(){
  epoch++;                                // aborts any running seeding/sim loops
  $('#verdict').classList.remove('on');
  $('#stinger').classList.remove('on');
  parts.length=0;
  showScene('#scene-title');
}
$('#btn-home').onclick=()=>{blip(500,.06,'triangle',.06);goHome()};

/* stage transition stinger */
function stinger(main,sub){
  const s=$('#stinger');
  $('#st-main').textContent=main;
  $('#st-sub').textContent=sub||'';
  s.style.setProperty('--stdur',(1900/SPEED)+'ms');
  s.classList.remove('on');void s.offsetWidth;   // restart the CSS animation
  s.classList.add('on');
  whoosh();
  // buffer past the animation end so fill-mode holds the (invisible) last frame
  return sleep(2080).then(()=>{s.classList.remove('on');return sleep(150)});
}

/* ══════════════ confetti ══════════════ */
const fx=$('#fx'),ctx=fx.getContext('2d');let parts=[],fxRun=false;
function fxSize(){fx.width=innerWidth;fx.height=innerHeight}
fxSize();addEventListener('resize',fxSize);
function confetti(colors,n=160,gravity=.12){
  for(let i=0;i<n;i++)parts.push({
    x:Math.random()*fx.width,y:-30-Math.random()*fx.height*.4,
    vx:(Math.random()-.5)*3.2,vy:1+Math.random()*3.2,g:gravity,
    w:6+Math.random()*8,h:8+Math.random()*10,rot:Math.random()*Math.PI,vr:(Math.random()-.5)*.25,
    c:colors[Math.floor(Math.random()*colors.length)]
  });
  if(!fxRun){fxRun=true;fxTick()}
}
function fxTick(){
  ctx.clearRect(0,0,fx.width,fx.height);
  parts=parts.filter(p=>p.y<fx.height+40);
  for(const p of parts){
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.rot+=p.vr;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
  }
  if(parts.length)requestAnimationFrame(fxTick);else{fxRun=false;ctx.clearRect(0,0,fx.width,fx.height)}
}

/* ══════════════ seeding ══════════════ */
$('#btn-start').onclick=()=>{ac();startSeeding()};

function startSeeding(){
  epoch++;
  const pool=[...TEAMS];                       // Fisher-Yates — uniform, unlike sort(random)
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  seeds=pool.slice(0,5);
  seedMap={};seeds.forEach((t,i)=>seedMap[t.id]=i+1);
  picks=[null,null,null,null];actual=[null,null,null,null];
  correct=0;runOver=false;watching=false;

  const row=$('#seed-row');row.innerHTML='';
  seeds.forEach((t,i)=>{
    row.insertAdjacentHTML('beforeend',`
      <div class="seed-slot">
        <div class="seed-num" id="sn${i}">${i+1}번 시드</div>
        <div class="seed-card" id="sc${i}"><div class="q">?</div></div>
      </div>`);
  });
  showScene('#scene-seed');
  revealSeeds();
}

async function revealSeeds(){
  const my=epoch;
  await sleep(600);
  for(let i=0;i<5;i++){
    if(my!==epoch)return;
    const card=$('#sc'+i);
    $('#sn'+i).classList.add('hot');
    card.classList.add('spin');
    const cycles=10+Math.floor(Math.random()*4);
    card.innerHTML='<div class="cycle"></div>';
    const cyc=card.firstElementChild;
    // single rAF clock drives text + tick together — no setTimeout jitter
    await new Promise(res=>{
      let c=0,next=performance.now();
      function spin(now){
        if(my!==epoch){res();return}
        if(now>=next){
          cyc.textContent=TEAMS[Math.floor(Math.random()*TEAMS.length)].name;
          blip(500+c*40,.04);
          next=now+(55+c*16)/SPEED;
          c++;
          if(c>=cycles){res();return}
        }
        requestAnimationFrame(spin);
      }
      requestAnimationFrame(spin);
    });
    if(my!==epoch)return;
    const t=seeds[i];
    card.style.setProperty('--tc1',t.c1);card.style.setProperty('--tc2',t.c2);
    card.classList.remove('spin');card.classList.add('landed');
    card.innerHTML=`${badgeHTML(t)}<div class="nm">${t.name}</div>`;
    chord([620,930],.22,.07);
    await sleep(360);
  }
  if(my!==epoch)return;
  chord([523,659,784,1046],.5,.07);
  await sleep(900);
  if(my!==epoch)return;
  const trans=stinger('예측 단계','각 라운드 승자를 선택하고 락인하세요');
  await sleep(950);                      // swap scenes while the band covers the screen
  if(my!==epoch)return;
  renderBracket();
  showScene('#scene-bracket');
  await trans;
}

/* preload logos once so re-renders never flash the initials fallback */
const logoOK={};
TEAMS.forEach(t=>{
  const im=new Image();
  im.onload=()=>{logoOK[t.id]=true};
  im.onerror=()=>{logoOK[t.id]=false};
  im.src=`logos/${t.id}.png`;
});
function badgeHTML(t,cls=''){
  if(logoOK[t.id]===true)
    return `<div class="badge ${cls} has-logo" style="--tc1:${t.c1};--tc2:${t.c2}"><span>${t.short}</span><img src="logos/${t.id}.png" alt=""></div>`;
  if(logoOK[t.id]===false)
    return `<div class="badge ${cls}" style="--tc1:${t.c1};--tc2:${t.c2}"><span>${t.short}</span></div>`;
  // preload still in flight — fall back to self-upgrading badge
  return `<div class="badge ${cls}" style="--tc1:${t.c1};--tc2:${t.c2}"><span>${t.short}</span><img src="logos/${t.id}.png" alt="" onload="this.parentElement.classList.add('has-logo')" onerror="this.remove()"></div>`;
}

/* ══════════════ prediction ══════════════ */
function slotHTML(t,opts={}){
  if(!t)return `<div class="slot empty">${opts.placeholder||'?'}</div>`;
  const cls=['slot'];
  if(opts.pickable)cls.push('pickable');
  if(opts.picked)cls.push('picked');
  return `<div class="${cls.join(' ')}" ${opts.pickable?`data-round="${opts.round}" data-team="${t.id}"`:''}>
    ${badgeHTML(t,'sm')}
    <div><span class="nm">${t.name}</span><span class="seedtag">${seedOf(t)}번 시드</span></div>
  </div>`;
}

function renderBracket(){
  const wrap=$('#ladder-wrap');wrap.innerHTML='';
  for(let i=0;i<4;i++){
    const R=ROUNDS[i];
    const unlocked=i===0||!!picks[i-1];
    const top=incumbent(i), bot=challengerPick(i);
    wrap.insertAdjacentHTML('beforeend',`
      <div class="matchup step${i} ${unlocked?'':'locked-off'}">
        <div class="mu-head"><span class="mu-tag">${R.name}</span><span class="mu-fmt">${R.fmt}</span></div>
        ${slotHTML(top,{pickable:unlocked,picked:picks[i]&&picks[i].id===top.id,round:i})}
        ${bot
          ?slotHTML(bot,{pickable:unlocked,picked:picks[i]&&picks[i].id===bot.id,round:i})
          :`<div class="slot empty">${ROUNDS[i-1].prevLabel}</div>`}
      </div>
      ${i<3?`<div class="chev c${i} hype">➤</div>`:''}
    `);
  }
  const champ=picks[3];
  wrap.insertAdjacentHTML('beforeend',`
    <div id="champ-slot">
      <div class="crown">👑</div>
      <div class="lbl">CHAMPION</div>
      <div class="who ${champ?'set':''}">${champ?champ.name:'우승팀 ?'}</div>
    </div>`);

  wrap.querySelectorAll('.slot.pickable').forEach(el=>{
    el.onclick=()=>{
      const r=+el.dataset.round;
      const t=TEAMS.find(x=>x.id===el.dataset.team);
      picks[r]=t;
      for(let j=r+1;j<4;j++)picks[j]=null;
      blip(880,.06,'triangle',.07);
      renderBracket();
    };
  });

  const ready=picks.every(Boolean);
  const lock=$('#btn-lock');
  lock.disabled=!ready;
  lock.classList.toggle('pulse',ready);
}

$('#btn-lock').onclick=async()=>{
  if(!picks.every(Boolean))return;
  const my=epoch;
  $('#btn-lock').disabled=true;$('#btn-lock').classList.remove('pulse');
  $('#btn-lock').textContent='🔒 예측 확정!';
  chord([392,523,659],.35,.08);
  document.body.classList.add('shake');
  setTimeout(()=>document.body.classList.remove('shake'),500);
  await sleep(900);
  $('#btn-lock').textContent='🔒 락인';
  if(my!==epoch)return;
  runBracket();
};

/* ══════════════ simulation ══════════════ */
function fighterHTML(t,isPick){
  return `${isPick?'<div class="pickmark">MY PICK</div>':''}
    ${badgeHTML(t)}
    <div class="nm">${t.name}</div><div class="seedtag">${seedOf(t)}번 시드</div>
    <div class="pips" style="--tc1:${t.c1}"></div>`;
}
function renderProgress(cur){
  const p=$('#progress');p.innerHTML='';
  ROUNDS.forEach((R,i)=>{
    let cls='pchip', mark='';
    if(actual[i]){
      const hit=picks[i].id===actual[i].id;
      cls+=hit?' hit':' miss';mark=hit?' ✓':' ✗';
    }else if(i===cur)cls+=' current';
    p.insertAdjacentHTML('beforeend',
      `<div class="${cls}">${R.tag} <b>${picks[i].short}${mark}</b></div>`);
  });
}

async function runBracket(){
  const my=epoch;
  showScene('#scene-series');
  for(let i=0;i<4;i++){
    // clear the arena and banner so the previous round isn't visible behind the stinger
    for(const f of[$('#fA'),$('#fB')]){f.innerHTML='';f.style.opacity='0'}
    $('#series-log').innerHTML='';
    $('#arena').style.visibility='hidden';
    $('#round-banner').style.visibility='hidden';
    renderProgress(i);      // current run's state, never the previous run's
    await stinger(i===3?'FINAL':`ROUND ${i+1}`,`${ROUNDS[i].name} · ${ROUNDS[i].fmt}`);
    if(my!==epoch)return;
    const winner=await runSeries(i);
    if(my!==epoch)return;
    actual[i]=winner;
    renderProgress(i);
    const hit=picks[i].id===winner.id;
    if(hit&&!watching){
      correct++;
      await showVerdict(true,i,winner,i===3);
      if(my!==epoch||i===3)return;
    }else if(!hit&&!watching){
      runOver=true;
      const cont=await showVerdict(false,i,winner,i===3);
      if(my!==epoch||!cont)return;   // 새로운 도전 chosen inside verdict
      watching=true;
      if(i===3){finale();return}
    }else if(i===3){finale();return}  // watching mode
  }
}

async function runSeries(i){
  const my=epoch;
  const R=ROUNDS[i];
  const A=incumbent(i), B=challengerActual(i);
  const need=Math.ceil(R.bestOf/2);

  $('#round-tag').textContent=`ROUND ${i+1} / 4`;
  $('#round-name').textContent=R.name;
  $('#round-fmt').textContent=`${R.fmt} · 먼저 ${need}승`;
  $('#round-banner').style.visibility='visible';
  $('#series-log').innerHTML='';
  $('#game-label').classList.remove('on');
  $('#mp-banner').classList.remove('on');
  const mo=$('#momentum');
  mo.style.setProperty('--ca',A.c1);mo.style.setProperty('--cb',B.c1);
  $('#mo-orb').style.transform='';   // back to the CSS-centered position
  renderProgress(i);

  const fA=$('#fA'),fB=$('#fB');
  for(const[f,t]of[[fA,A],[fB,B]]){
    f.className='fighter';
    f.style.setProperty('--tc1',t.c1);f.style.setProperty('--tc2',t.c2);
    f.innerHTML=fighterHTML(t,picks[i]&&picks[i].id===t.id&&!watching);
    const pips=f.querySelector('.pips');
    for(let k=0;k<need;k++)pips.insertAdjacentHTML('beforeend','<div class="pip"></div>');
  }
  // vs intro
  fA.style.transform='translateX(-80px)';fB.style.transform='translateX(80px)';
  fA.style.opacity='0';fB.style.opacity='0';
  $('#arena').style.visibility='visible';
  await sleep(60);
  fA.style.transition='all .45s cubic-bezier(.2,1.4,.4,1)';fB.style.transition=fA.style.transition;
  fA.style.transform='';fB.style.transform='';fA.style.opacity='1';fB.style.opacity='1';
  chord([330,494],.3,.07);
  await sleep(1100);
  fA.style.transition='';fB.style.transition='';
  if(my!==epoch)return A;

  let a=0,b=0;
  for(let g=1;a<need&&b<need;g++){
    const mp=(a===need-1||b===need-1);
    $('#game-label').textContent=`GAME ${g}`;
    $('#game-label').classList.add('on');
    $('#mp-banner').classList.toggle('on',mp);
    const winA=Math.random()<0.5;
    await rollGame(fA,fB,winA,mp);
    const wt=winA?A:B, wf=winA?fA:fB;
    if(winA)a++;else b++;
    wf.querySelectorAll('.pip')[ (winA?a:b)-1 ].classList.add('won');
    $('#series-log').insertAdjacentHTML('beforeend',
      `<div class="logbox" style="--lc:${wt.c1}">G${g}</div>`);
    blip(winA?820:620,.1,'triangle',.08);
    await sleep(mp?950:700);
    if(my!==epoch)return A;
  }
  $('#mp-banner').classList.remove('on');
  $('#game-label').classList.remove('on');

  const winner=a===need?A:B;
  const wf=a===need?fA:fB, lf=a===need?fB:fA;
  await sleep(300);
  wf.classList.add('swin');lf.classList.add('slose');
  $('#round-fmt').textContent=`${winner.name} 시리즈 승리! (${Math.max(a,b)} : ${Math.min(a,b)})`;
  chord([523,659,784],.45,.08);
  confetti([winner.c1,'#ffffff',winner.c2],70,.15);
  await sleep(1500);
  return winner;
}

function rollGame(fA,fB,winA,mp){
  return new Promise(res=>{
    const my=epoch;
    const orb=$('#mo-orb');
    const cA=fA.style.getPropertyValue('--tc1'), cB=fB.style.getPropertyValue('--tc1');
    const half=88;                     // orb travel (px) each side
    const dur=(mp?2600:1800)/SPEED;
    const cycles=mp?5:3.5;
    const target=winA?-1:1;
    fA.classList.add('rolling');fB.classList.add('rolling');
    const lean=(f,c,amt)=>{            // continuous glow ∝ momentum, no blinking
      f.style.transform=`scale(${(1+amt*.05).toFixed(4)})`;
      f.style.boxShadow=amt>.03
        ?`0 0 ${Math.round(16+amt*36)}px color-mix(in srgb,${c} ${Math.round(amt*65)}%,transparent)`
        :'none';
    };
    const t0=performance.now();
    let lastSign=0;
    function frame(now){
      if(my!==epoch){
        for(const f of[fA,fB]){f.classList.remove('rolling','gwin');f.style.transform='';f.style.boxShadow=''}
        res();return;
      }
      const t=Math.min(1,(now-t0)/dur);
      const chirp=1-Math.pow(1-t,2);                 // oscillation slows over time
      const osc=Math.sin(2*Math.PI*cycles*chirp);
      const settle=t*t*t;                            // eases toward the winner late
      const p=osc*(1-settle)+target*settle;          // -1 = A side, +1 = B side
      orb.style.transform=`translate(calc(-50% + ${(p*half).toFixed(1)}px),-50%)`;
      lean(fA,cA,Math.max(0,-p));
      lean(fB,cB,Math.max(0,p));
      const sign=p>.06?1:p<-.06?-1:0;
      if(sign!==0&&sign!==lastSign){
        if(lastSign!==0)blip(sign<0?720:580,.04,'square',.04);
        lastSign=sign;
      }
      if(t<1){requestAnimationFrame(frame);return}
      lean(winA?fB:fA,winA?cB:cA,0);
      (winA?fA:fB).classList.add('gwin');
      setTimeout(()=>{
        for(const f of[fA,fB]){f.classList.remove('rolling','gwin');f.style.transform='';f.style.boxShadow=''}
        res();
      },500/SPEED);
    }
    requestAnimationFrame(frame);
  });
}

/* ══════════════ verdict ══════════════ */
function showVerdict(hit,i,winner,isLast){
  return new Promise(res=>{
    const my=epoch;
    const v=$('#verdict');
    v.className=hit?'hit on':'miss on';
    const btns=$('#v-btns');btns.innerHTML='';
    if(hit){
      $('#v-big').textContent=isLast?'퍼펙트!':'적중!';
      $('#v-why').textContent=`${ROUNDS[i].name} — ${winner.name} 승리 예측 성공 (${correct}/4)`;
      if(isLast)perfectFanfare();else hitSound();
      confetti(['#ffd76a','#ffffff','#3df58c',winner.c1],isLast?320:130,.12);
      if(isLast){
        setTimeout(()=>{if(my!==epoch)return;v.classList.remove('on');finale();res(false)},2600/SPEED);
      }else{
        setTimeout(()=>{if(my!==epoch)return;v.classList.remove('on');res(true)},1700/SPEED);
      }
    }else{
      $('#v-big').textContent='RUN OVER';
      $('#v-why').textContent=`${ROUNDS[i].name} — 픽: ${picks[i].name} / 실제 승자: ${winner.name} (${correct}/4 적중)`;
      sadTrombone();
      document.body.classList.add('shake');
      setTimeout(()=>document.body.classList.remove('shake'),500);
      const bRetry=document.createElement('button');
      bRetry.className='btn';bRetry.textContent='새로운 도전 🎲';
      bRetry.onclick=()=>{res(false);goHome()};
      btns.appendChild(bRetry);
      if(!isLast){
        const bWatch=document.createElement('button');
        bWatch.className='btn ghost';bWatch.textContent='남은 경기 관전 👀';
        bWatch.onclick=()=>{v.classList.remove('on');res(true)};
        btns.appendChild(bWatch);
      }else{
        const bFin=document.createElement('button');
        bFin.className='btn ghost';bFin.textContent='결과 보기';
        bFin.onclick=()=>{v.classList.remove('on');finale();res(false)};
        btns.appendChild(bFin);
      }
    }
  });
}

/* ══════════════ finale ══════════════ */
function finale(){
  const champ=actual[3];
  const perfect=!runOver&&correct===4;
  const head=$('#final-head');
  if(perfect){
    head.textContent='퍼펙트 브래킷!';head.className='hype perfect';
    $('#final-sub').textContent='4개 라운드 전부 적중 — 오늘 로또 사러 가자';
    confetti(['#ffd76a','#ffffff','#ffe9a8',champ?champ.c1:'#fff'],380,.1);
    // no fanfare here — the perfect verdict already played it 2.6s ago
  }else{
    head.textContent='RUN OVER';head.className='hype over';
    $('#final-sub').textContent=`${correct}/4 적중 — 다음 런을 노려보자`;
  }
  $('#fc-who').textContent=champ?champ.name:'—';

  const rv=$('#review');rv.innerHTML='';
  ROUNDS.forEach((R,i)=>{
    const act=actual[i], pk=picks[i];
    let cls='rev-row',mark='—';
    if(act){const hit=pk.id===act.id;cls+=hit?' hit':' miss';mark=hit?'✓':'✗'}
    else cls+=' skip';
    rv.insertAdjacentHTML('beforeend',`
      <div class="${cls}">
        <span class="r-tag">${R.name}</span>
        <span class="r-pick"><span class="dot" style="background:${pk.c1}"></span>${pk.name}</span>
        <span class="r-mark">${mark}</span>
        <span class="r-act">${act?`<span class="dot" style="background:${act.c1}"></span>${act.name}`:'미진행'}</span>
      </div>`);
  });
  showScene('#scene-final');
}
$('#btn-again').onclick=()=>goHome();

/* title screen logo marquee — rAF-driven, enough copies to cover any viewport */
(function(){
  const groupHTML=`<div class="mq-group">${TEAMS.map(t=>badgeHTML(t)).join('')}</div>`;
  const track=$('#mq-track');
  track.innerHTML=groupHTML+groupHTML;
  function ensureCoverage(){                     // track must span viewport + one wrap length
    const w=track.firstElementChild.offsetWidth;
    if(!w)return;
    while(track.offsetWidth<innerWidth+2*w)track.insertAdjacentHTML('beforeend',groupHTML);
  }
  ensureCoverage();
  addEventListener('resize',ensureCoverage);
  const titleScene=$('#scene-title');
  let x=0,last=performance.now();
  function step(now){
    const dt=Math.min(100,now-last);last=now;
    if(titleScene.classList.contains('active')){ // don't burn frames while hidden
      x-=dt*.028;                                // ~28px/s drift
      const w=track.firstElementChild.offsetWidth;
      if(w>0&&-x>=w)x+=w;                        // seamless wrap, one group at a time
      track.style.transform=`translateX(${x}px)`;
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
})();
