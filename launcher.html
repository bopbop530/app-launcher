<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스트림 런처 — Stream Launcher</title>
<style>
  :root {
    --blossom: #FBD3E0;
    --lavender: #E3DBFB;
    --mint: #CDEBDD;
    --peach: #FCE0CE;
    --butter: #FBF0C9;
    --sky: #D3E8FB;
    --ink: #6b4a5a;        /* soft plum text */
    --ink-soft: #a081909e;
    --card: #ffffff;
    --line: #f3d9e6;
    --accent: #e98bb3;     /* candy pink */
    --accent-deep: #c25c87;
    --win: #5cc4a0;
    --bust: #f08a96;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }

  body {
    font-family: "Pretendard", "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
    background:
      radial-gradient(circle at 18% 12%, #fff4f9 0%, transparent 55%),
      radial-gradient(circle at 82% 88%, #f1ecff 0%, transparent 55%),
      linear-gradient(160deg, #fff7fb, #fdeff6 55%, #f4eefe);
    color: var(--ink);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 18px 44px;
  }

  /* ---------- header + mascot ---------- */
  .topbar {
    width: 100%;
    max-width: 1040px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  .mascot { width: 64px; height: 64px; flex: none; transform-origin: 50% 100%; }
  .mascot.cheer { animation: cheer .6s ease infinite; }
  @keyframes cheer { 0%,100%{transform:rotate(-6deg);} 50%{transform:rotate(6deg);} }
  .titles h1 { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
  .titles p { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }

  .stage {
    width: 100%;
    max-width: 1040px;
    flex: 1;
  }

  .clay {
    background: var(--card);
    border-radius: 26px;
    box-shadow: 0 14px 34px rgba(214,150,180,.20), inset 0 2px 0 rgba(255,255,255,.9), 0 0 0 1px var(--line);
    padding: 22px;
    width: fit-content;
    margin: 0 auto;
  }

  /* ---------- app select ---------- */
  .modes { display: grid; grid-template-columns: repeat(2, 220px); gap: 18px; justify-content: center; }
  .mode-card {
    cursor: pointer;
    border: none;
    text-align: center;
    border-radius: 22px;
    padding: 26px 22px;
    width: 220px;
    height: 196px;   /* uniform: fits a 2-line description */
    color: var(--ink);
    box-shadow: 0 12px 28px rgba(214,150,180,.18), inset 0 2px 0 rgba(255,255,255,.85);
    transition: transform .14s ease, box-shadow .2s ease;
    font-family: inherit;
  }
  .mode-card:hover { transform: translateY(-4px); box-shadow: 0 20px 38px rgba(214,150,180,.28), inset 0 2px 0 rgba(255,255,255,.85); }
  .mode-card:active { transform: translateY(-1px) scale(.99); }
  .mode-card.ledger{ background: linear-gradient(160deg, var(--blossom), var(--butter)); }
  .mode-card.muk   { background: linear-gradient(160deg, var(--blossom), var(--peach)); }
  .mode-card.raf   { background: linear-gradient(160deg, var(--sky), var(--lavender)); }
  .mode-card.kbo   { background: linear-gradient(160deg, var(--mint), var(--butter)); }
  .mode-card.claw  { background: linear-gradient(160deg, var(--lavender), var(--blossom)); }
  .mode-card.stamp { background: linear-gradient(160deg, var(--butter), var(--peach)); }
  .mode-card .emoji { font-size: 40px; display: block; margin-bottom: 8px; }
  .mode-card .icon { width: 46px; height: 46px; display: block; margin: 0 auto 8px; }
  .mode-card h2 { font-size: 20px; font-weight: 800; }
  .mode-card .tag { font-size: 14px; color: var(--accent-deep); margin-top: 6px; font-weight: 600; }
  .mode-card p { font-size: 13px; color: var(--ink); opacity: .72; margin-top: 10px; line-height: 1.55; }

  .hint {
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 18px;
    min-height: 18px;
  }
</style>
</head>
<body>
  <div class="topbar">
    <svg class="mascot" id="mascot" viewBox="0 0 100 100" aria-hidden="true">
      <defs>
        <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
          <feDropShadow dx="0" dy="1.4" stdDeviation="1.5" flood-color="#d9c1d3" flood-opacity="0.5"/>

      </defs>

      <ellipse cx="58" cy="95" rx="5.6" ry="4.2" fill="#fff" filter="url(#soft)"/>
      <g fill="#fff" filter="url(#soft)">
        <circle cx="50" cy="13" r="9"/>
        <circle cx="36" cy="15" r="8.5"/>
        <circle cx="64" cy="15" r="8.5"/>
        <circle cx="23" cy="25" r="9.5"/>
        <circle cx="77" cy="25" r="9.5"/>
        <circle cx="15" cy="40" r="10"/>
        <circle cx="85" cy="40" r="10"/>
        <circle cx="15" cy="55" r="10.5"/>
        <circle cx="85" cy="55" r="10.5"/>
        <circle cx="28" cy="60" r="10.5"/>
        <circle cx="72" cy="60" r="10.5"/>
        <circle cx="40" cy="63" r="10.5"/>
        <circle cx="60" cy="63" r="10.5"/>

      </g>
      <circle cx="50" cy="40" r="26" fill="#fff"/>
      <circle cx="32" cy="44" r="13" fill="#fff"/>
      <circle cx="68" cy="44" r="13" fill="#fff"/>
      <circle cx="50" cy="52" r="13" fill="#fff"/>
      <ellipse cx="16" cy="58" rx="6" ry="9" fill="#f2e6ee" opacity=".7"/>
      <ellipse cx="84" cy="58" rx="6" ry="9" fill="#f2e6ee" opacity=".7"/>
      <ellipse cx="39.5" cy="40" rx="7" ry="7.4" fill="#efe3eb"/>
      <ellipse cx="60.5" cy="40" rx="7" ry="7.4" fill="#efe3eb"/>

      <circle cx="62.3" cy="38.1" r="1.7" fill="#fff"/>

      <circle cx="58.8" cy="41.7" r="0.9" fill="#fff" opacity=".75"/>

      <ellipse cx="70" cy="49" rx="4.8" ry="3.1" fill="#fcd0de" opacity=".85"/>
      <path d="M44.6 46 Q50 45 55.4 46 Q53.7 51.6 50 52.6 Q46.3 51.6 44.6 46 Z" fill="#2f242a"/>
      <ellipse cx="49.3" cy="47.2" rx="2" ry="1" fill="#6b5560" opacity=".7"/>

      <path id="mouth" d="M45 55 Q50 59 55 55" stroke="#b06a86" stroke-width="2" fill="none" stroke-linecap="round"/>

        <circle cx="45" cy="9" r="5.2"/>
        <circle cx="55" cy="9" r="4.8"/>
      </g>
      <g transform="translate(58,7) rotate(16)">
        <path d="M0 0 L-8.5 -5 L-8.5 5 Z" fill="#fbb6cf" stroke="#e98bb3" stroke-width="1"/>
        <path d="M0 0 L8.5 -5 L8.5 5 Z" fill="#fbb6cf" stroke="#e98bb3" stroke-width="1"/>
        <circle cx="0" cy="0" r="2.8" fill="#e98bb3"/>
      </g>
    </svg>
    <div class="titles">
      <h1>스트림 런처 <span style="opacity:.5;font-weight:500;font-size:16px">Stream Launcher</span></h1>
      <p>방송에서 쓸 앱을 골라 실행하세요 · pick an app to launch</p>
    </div>
  </div>

  <div class="stage">
    <div class="clay">
      <div class="modes">
        <button class="mode-card ledger" id="goLedger">
          <svg class="icon" viewBox="0 0 48 48" aria-hidden="true">
            <rect x="7.5" y="7" width="25" height="34" rx="3.5" fill="#ffffff" stroke="#d9a8c0" stroke-width="1.8"/>
            <path d="M7.5 10.5 Q7.5 7 11 7 L13 7 L13 41 L11 41 Q7.5 41 7.5 37.5 Z" fill="#fbd3e0" stroke="#d9a8c0" stroke-width="1.4"/>
            <line x1="17" y1="14.5" x2="29" y2="14.5" stroke="#e8c4d6" stroke-width="1.7" stroke-linecap="round"/>
            <line x1="17" y1="20.5" x2="29" y2="20.5" stroke="#e8c4d6" stroke-width="1.7" stroke-linecap="round"/>
            <line x1="17" y1="26.5" x2="24" y2="26.5" stroke="#e8c4d6" stroke-width="1.7" stroke-linecap="round"/>
            <rect x="25.5" y="27.5" width="15.5" height="12.5" rx="2.2" fill="#f7a8c8" stroke="#c25c87" stroke-width="1.5"/>
            <line x1="33.25" y1="27.5" x2="33.25" y2="40" stroke="#c25c87" stroke-width="1.4"/>
            <line x1="25.5" y1="32.5" x2="41" y2="32.5" stroke="#c25c87" stroke-width="1.4"/>
            <path d="M33.25 27.5 Q29.5 23.5 27.8 26 Q26.9 28 33.25 27.5 Z" fill="#fbd3e0" stroke="#c25c87" stroke-width="1.2"/>
            <path d="M33.25 27.5 Q37 23.5 38.7 26 Q39.6 28 33.25 27.5 Z" fill="#fbd3e0" stroke="#c25c87" stroke-width="1.2"/>
          </svg>
          <h2>요모 기록부</h2>
          <p>시청자별 상품 정리 · 추가/삭제 &amp; 시트 자동 백업</p>
        </button>
        <button class="mode-card muk" id="goMukbang">
          <span class="emoji">🍽️</span><h2>먹방 트래커</h2>
          <p>먹어 / 먹지마 트래커</p>
        </button>
        <button class="mode-card raf" id="goRaffle">
          <span class="emoji">🎟️</span><h2>요모 두산 뽑기</h2>
          <p>추첨 보드 · 당첨 티커</p>
        </button>
        <button class="mode-card kbo" id="goKbo">
          <span class="emoji">⚾</span><h2>KBO 브래킷 예측</h2>
          <p>가을야구 승부 예측 · 시드 추첨 &amp; 시뮬레이션</p>
        </button>
        <button class="mode-card claw" id="goClaw">
          <svg class="icon" viewBox="0 0 48 48" aria-hidden="true">
            <line x1="24" y1="2" x2="24" y2="11" stroke="#8a94ad" stroke-width="3" stroke-linecap="round"/>
            <rect x="15" y="10" width="18" height="11" rx="4.5" fill="#ccd6e6" stroke="#8a94ad" stroke-width="2"/>
            <circle cx="24" cy="15.5" r="1.9" fill="#e98bb3"/>
            <path d="M18 21 Q10 26 13 35" fill="none" stroke="#8a94ad" stroke-width="3.6" stroke-linecap="round"/>
            <path d="M30 21 Q38 26 35 35" fill="none" stroke="#8a94ad" stroke-width="3.6" stroke-linecap="round"/>
            <circle cx="24" cy="35" r="8" fill="#ffffff" stroke="#d9a8c0" stroke-width="1.6"/>
            <path d="M16 35 A8 8 0 0 1 32 35 Z" fill="#f7a8c8"/>
            <line x1="16.4" y1="35" x2="31.6" y2="35" stroke="#c98bab" stroke-width="1.4"/>
            <circle cx="20.6" cy="31.6" r="2" fill="#fff" opacity=".85"/>
          </svg>
          <h2>클로 가챠</h2>
          <p>클로 머신 · 캡슐 뽑기 랜덤 추첨 (메뉴/상품/벌칙)</p>
        </button>
        <button class="mode-card stamp" id="goStamp">
          <svg class="icon" viewBox="0 0 48 48" aria-hidden="true">
            <path d="M9 8 Q7 8 7.5 10 L6.5 38 Q6.5 40 9 40 L39 40.5 Q41.5 40.5 41 38 L41.5 10 Q41.5 8 39 8 Z"
              fill="#fdf3d8" stroke="#d9bd8a" stroke-width="1.6"/>
            <line x1="13" y1="15" x2="35" y2="15" stroke="#d9bd8a" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="1.5 3"/>
            <line x1="13" y1="21" x2="30" y2="21" stroke="#e4ceA3" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="1.5 3"/>

            <path d="M12 33 Q14 30 17 31.5" fill="none" stroke="#c9a86a" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <h2>노래 도장판</h2>
          <p>신청곡 10곡 도장 모으기 · 다 모으면 보상 추첨</p>
        </button>
      </div>
    </div>
  </div>

  <div class="hint" id="hint"></div>

<script>
  var mascot = document.getElementById("mascot");
  var mouth = document.getElementById("mouth");
  var hint = document.getElementById("hint");

  function openApp(url, name, w, h) {
    mascot.classList.add("cheer");
    setTimeout(function () { mascot.classList.remove("cheer"); }, 600);

    w = w || 1320; h = h || 860;
    var win = window.open(url, name, "width=" + w + ",height=" + h + ",menubar=no,toolbar=no,location=no,status=no");
    if (win) {
      win.focus();
      hint.textContent = "";
    } else {
      hint.textContent = "팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요.";
    }
  }

  document.getElementById("goLedger").addEventListener("click", function () {
    openApp("prize-ledger.html", "prizeLedger", 1180, 900);
  });
  document.getElementById("goMukbang").addEventListener("click", function () {
    openApp("mukbang-board.html", "mukbangLaunch", 615, 500);
  });
  document.getElementById("goRaffle").addEventListener("click", function () {
    openApp("raffle-board4.html?role=board", "raffleBoard", 830, 910);
  });
  document.getElementById("goKbo").addEventListener("click", function () {
    openApp("kbo-bracket.html", "kboBracket", 1600, 950);
  });
  document.getElementById("goClaw").addEventListener("click", function () {
    openApp("claw-machine.html", "clawMachine", 1260, 960);
  });
  document.getElementById("goStamp").addEventListener("click", function () {
    openApp("stamp-card.html", "stampCard", 700, 460);
  });
</script>
</body>
</html>
